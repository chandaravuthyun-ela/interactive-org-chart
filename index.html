        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

        const firebaseConfig = {
            // apiKey: "...",
            // authDomain: "...",
            // projectId: "...",
            // storageBucket: "...",
            // messagingSenderId: "...",
            // appId: "..."
        };

        if (Object.keys(firebaseConfig).length > 0) {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.firebaseReady = true;
        } else {
            window.firebaseReady = false;
            console.warn("⚠️ Firebase is not configured! Running in local temporary memory mode.");
        }

        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.onSnapshot = onSnapshot;
        window.fbCollection = collection;
        window.getDocs = getDocs;
        window.deleteDoc = deleteDoc;
    </script>

        // ─── Convert remote image to base64 data URL via canvas ─────────────────────
        const toBase64ViaCanvas = (src) => new Promise((resolve) => {
            const img = new Image();
            img.crossOrigin = 'anonymous';
            img.onload = () => {
                const c = document.createElement('canvas');
                c.width = img.naturalWidth || 200;
                c.height = img.naturalHeight || 200;
                c.getContext('2d').drawImage(img, 0, 0);
                try { resolve(c.toDataURL('image/jpeg', 0.92)); }
                catch (e) { resolve(src); }
            };
            img.onerror = () => resolve(src);
            img.src = src + (src.includes('?') ? '&' : '?') + '_cb=' + Date.now();
        });

        // Image resize/compress for upload
        const processImageFile = (file, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600;
                    let { width, height } = img;
                    if (width > height) {
                        if (width > MAX_SIZE) { height = Math.round(height * MAX_SIZE / width); width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width = Math.round(width * MAX_SIZE / height); height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.88));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        // ─── EXPORT WORKER ──────────────────────────────────────────────────────────
        const A4 = { wmm: 210, hmm: 297 };

        const bakeAllImages = async (cloneEl) => {
            const imgs = Array.from(cloneEl.querySelectorAll('img'));
            await Promise.all(imgs.map(async (img) => {
                const src = img.getAttribute('src') || '';
                if (!src || src.startsWith('data:')) return;
                const b64 = await toBase64ViaCanvas(src);
                img.src = b64;
                // Force fixed dimensions so layout engine doesn't stretch
                img.style.width = img.offsetWidth ? img.offsetWidth + 'px' : '72px';
                img.style.height = img.offsetHeight ? img.offsetHeight + 'px' : '72px';
                img.style.objectFit = 'cover';
                img.style.flexShrink = '0';
            }));
        };

        const handleExport = async (format, setIsExporting, setAlertDialog, sourceId = 'org-chart-export-area', fileLabel = 'ELA_Org_Chart') => {
            setIsExporting(true);
            try {
                if (!window.html2canvas) {
                    await new Promise((res, rej) => {
                        const s = document.createElement('script');
                        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                        s.onload = res; s.onerror = rej;
                        document.head.appendChild(s);
                    });
                }
                const liveArea = document.getElementById(sourceId);
                if (!liveArea) throw new Error('Chart element not found');

                // ── Build off-screen wrapper ──────────────────────────────────────
                const wrapper = document.createElement('div');
                wrapper.style.cssText = [
                    'position:fixed','top:-99999px','left:-99999px','z-index:-9999',
                    'background:#ffffff','overflow:visible','padding:60px',
                ].join(';');

                const clone = liveArea.cloneNode(true);

                // Remove UI-only controls from the clone
                clone.querySelectorAll('[data-html2canvas-ignore]').forEach(el => el.remove());

                // ── Style overrides for clean rendering ───────────────────────────
                const overrideStyle = document.createElement('style');
                overrideStyle.textContent = `
                    * {
                        transition: none !important;
                        animation: none !important;
                        -webkit-backdrop-filter: none !important;
                        backdrop-filter: none !important;
                        box-sizing: border-box !important;
                    }
                    /* Ensure all text never overflows or gets clipped */
                    .export-card-name {
                        white-space: normal !important;
                        overflow: visible !important;
                        word-break: break-word !important;
                        font-size: 12px !important;
                        line-height: 1.4 !important;
                        font-weight: 800 !important;
                        color: #1f2937 !important;
                    }
                    .export-card-role {
                        white-space: normal !important;
                        overflow: visible !important;
                        word-break: break-word !important;
                        font-size: 10px !important;
                        line-height: 1.4 !important;
                        font-weight: 700 !important;
                        color: #dfa634 !important;
                    }
                    /* Remove expand toggle and hidden staff sections */
                    .staff-toggle-btn { display: none !important; }
                    /* Staff panels already expanded via inline style by export logic */
                    .staff-collapsed { max-height: none !important; overflow: visible !important; opacity: 1 !important; }

                    .dept-card { overflow: visible !important; }
                    /* Photo squares must not stretch */
                    .export-photo {
                        width: 72px !important;
                        height: 72px !important;
                        object-fit: cover !important;
                        flex-shrink: 0 !important;
                        border-radius: 10px !important;
                    }

                        width: 88px !important;
                        height: 88px !important;
                        object-fit: cover !important;
                        flex-shrink: 0 !important;
                        border-radius: 12px !important;
                    }
                    /* Staff card fixed width */
                    .export-staff-card {
                        width: 220px !important;
                        min-width: 220px !important;
                        overflow: visible !important;
                    }
                `;
                wrapper.appendChild(overrideStyle);
                wrapper.appendChild(clone);
                document.body.appendChild(wrapper);

                // Force expand all staff panels for export
                clone.querySelectorAll('[data-staff-panel]').forEach(el => {
                    el.style.maxHeight = 'none';
                    el.style.overflow = 'visible';
                    el.style.opacity = '1';
                    el.style.display = 'flex';
                });

                // Flatten backdrop-filter
                clone.querySelectorAll('*').forEach(el => {
                    const cls = (typeof el.className === 'string') ? el.className : '';
                    if (cls.includes('backdrop-blur') || cls.includes('bg-white/90')) {
                        el.style.background = '#ffffff';
                        el.style.backdropFilter = 'none';
                        el.style.webkitBackdropFilter = 'none';
                    }
                    if (cls.includes('rounded-3xl') || cls.includes('rounded-2xl') || cls.includes('rounded-xl')) {
                        el.style.overflow = 'visible';
                    }
                });

                // ── Bake all photos to base64 ─────────────────────────────────────
                await bakeAllImages(wrapper);
                // Extra wait for layout to settle
                await new Promise(r => setTimeout(r, 600));

                // ── Measure actual content bounds ─────────────────────────────────
                const PAD = 80;
                const contentW = Math.ceil(wrapper.scrollWidth + PAD * 2);
                const contentH = Math.ceil(wrapper.scrollHeight + PAD * 2);
                wrapper.style.width = contentW + 'px';
                wrapper.style.minHeight = contentH + 'px';

                const SCALE = 2.5;
                const canvas = await window.html2canvas(wrapper, {
                    backgroundColor: '#ffffff',
                    scale: SCALE,
                    useCORS: true,
                    allowTaint: false,
                    logging: false,
                    width: contentW,
                    height: contentH,
                    windowWidth: contentW,
                    windowHeight: contentH,
                    x: 0, y: 0, scrollX: 0, scrollY: 0,
                    imageTimeout: 12000,
                    onclone: (clonedDoc) => {
                        clonedDoc.querySelectorAll('[class]').forEach(el => {
                            const cls = (typeof el.className === 'string') ? el.className : '';
                            if (cls.includes('bg-white/90') || cls.includes('backdrop-blur')) {
                                el.style.background = '#ffffff';
                                el.style.backdropFilter = 'none';
                            }
                        });
                        // Expand staff panels in the cloned doc too
                        clonedDoc.querySelectorAll('[data-staff-panel]').forEach(el => {
                            el.style.maxHeight = 'none';
                            el.style.overflow = 'visible';
                            el.style.opacity = '1';
                        });
                    }
                });
                document.body.removeChild(wrapper);

                // White-fill final canvas
                const fullCanvas = document.createElement('canvas');
                fullCanvas.width = canvas.width;
                fullCanvas.height = canvas.height;
                const fctx = fullCanvas.getContext('2d');
                fctx.fillStyle = '#ffffff';
                fctx.fillRect(0, 0, fullCanvas.width, fullCanvas.height);
                fctx.drawImage(canvas, 0, 0);

                if (format === 'png') {
                    const link = document.createElement('a');
                    link.download = `${fileLabel}.png`;
                    link.href = fullCanvas.toDataURL('image/png');
                    link.click();
                } else if (format === 'pdf') {
                    if (!window.jspdf) {
                        await new Promise((res, rej) => {
                            const s = document.createElement('script');
                            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                            s.onload = res; s.onerror = rej;
                            document.head.appendChild(s);
                        });
                    }
                    const { jsPDF } = window.jspdf;
                    const chartLandscape = fullCanvas.width >= fullCanvas.height;
                    const pageWmm = chartLandscape ? A4.hmm : A4.wmm;
                    const pageHmm = chartLandscape ? A4.wmm : A4.hmm;
                    const MARGIN_MM = 6;
                    const printWmm = pageWmm - MARGIN_MM * 2;
                    const printHmm = pageHmm - MARGIN_MM * 2;
                    const scaleW = printWmm / fullCanvas.width;
                    const scaleH = printHmm / fullCanvas.height;
                    const s = Math.min(scaleW, scaleH);
                    const drawWmm = fullCanvas.width * s;
                    const drawHmm = fullCanvas.height * s;
                    const offX = (pageWmm - drawWmm) / 2;
                    const offY = (pageHmm - drawHmm) / 2;
                    const pdf = new jsPDF({ orientation: chartLandscape ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });
                    pdf.addImage(fullCanvas.toDataURL('image/png'), 'PNG', offX, offY, drawWmm, drawHmm, undefined, 'FAST');
                    pdf.save(`${fileLabel}.pdf`);
                }
            } catch (err) {
                console.error('Export failed:', err);
                setAlertDialog('Export failed: ' + err.message + '. Check the browser console for details.');
            } finally {
                setIsExporting(false);
            }

        // ─── STAFF CARD — redesigned for export clarity ──────────────────────────
        // Fixed 220px wide, photo on left (64×64 square), name+role on right, no text truncation
        const StaffCard = ({ s, onClick, draggable, onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isDragOver }) => (

                </div>
                {/* Text — allow wrapping, no truncation */}
                <div className="flex-1 pr-3 py-3 flex flex-col justify-center" style={{ minWidth: 0, overflow: 'visible' }}>
                    <p className="export-card-name" style={{ fontSize: '11.5px', fontWeight: 800, color: '#1f2937', lineHeight: 1.35, wordBreak: 'break-word', whiteSpace: 'normal' }}>{s.name}</p>
                    <p className="export-card-role mt-1" style={{ fontSize: '9.5px', fontWeight: 700, color: '#dfa634', lineHeight: 1.35, wordBreak: 'break-word', whiteSpace: 'normal' }}>{s.role}</p>
