        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot, collection, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            // apiKey: "...",
            // authDomain: "...",
            // projectId: "...",
            // storageBucket: "...",
            // messagingSenderId: "...",
            // appId: "..."
        };

        if (Object.keys(firebaseConfig).length > 0) {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.firebaseReady = true;
        } else {
            window.firebaseReady = false;
            console.warn("⚠️ Firebase is not configured! Running in local temporary memory mode.");
        }

        window.doc = doc;
        window.setDoc = setDoc;
        window.getDoc = getDoc;
        window.onSnapshot = onSnapshot;
        window.fbCollection = collection;
        window.getDocs = getDocs;
        window.deleteDoc = deleteDoc;
    </script>

        // Image resize/compress for upload
        const processImageFile = (file, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600;
                    let { width, height } = img;
                    if (width > height) {
                        if (width > MAX_SIZE) { height = Math.round(height * MAX_SIZE / width); width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width = Math.round(width * MAX_SIZE / height); height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.85));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        const preloadImagesForExport = async (element) => {
            const imgs = Array.from(element.querySelectorAll('img'));
            await Promise.all(imgs.map(img => new Promise(resolve => {
                if (!img.src || img.src.startsWith('data:')) { resolve(); return; }
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const image = new Image();
                image.crossOrigin = 'anonymous';
                image.onload = () => {
                    canvas.width = image.naturalWidth || 150;
                    canvas.height = image.naturalHeight || 150;
                    ctx.drawImage(image, 0, 0);
                    try { img.src = canvas.toDataURL('image/jpeg', 0.9); } catch (e) { /* tainted */ }
                    resolve();
                };
                image.onerror = () => resolve();
                image.src = img.src + (img.src.includes('?') ? '&' : '?') + '_cb=' + Date.now();
            })));
        };

        // ─── EXPORT WORKER ──────────────────────────────────────────────────────────
        // Exports current view onto an A4 page at 300 DPI, pure-white background.
        // FIX #3: margins reduced to 3mm so content fills more of the page.
        const A4 = { wmm: 210, hmm: 297 };

        const handleExport = async (format, setIsExporting, setAlertDialog, sourceId = 'org-chart-export-area', fileLabel = 'ELA_Org_Chart') => {
            setIsExporting(true);
            try {
                if (!window.html2canvas) {
                    await new Promise((res, rej) => {
                        const s = document.createElement('script');
                        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                        s.onload = res; s.onerror = rej;
                        document.head.appendChild(s);
                    });
                }
                const liveArea = document.getElementById(sourceId);
                if (!liveArea) throw new Error('Chart element not found');

                const wrapper = document.createElement('div');
                wrapper.style.cssText = [
                    'position:fixed','top:-99999px','left:-99999px','z-index:-9999',
                    'background:#ffffff','overflow:visible','padding:40px 30px',
                ].join(';');

                const clone = liveArea.cloneNode(true);
                const overrideStyle = document.createElement('style');
                overrideStyle.textContent = `
                    [class*="max-h-[5000px]"] { max-height: none !important; overflow: visible !important; opacity: 1 !important; }
                    [class*="rounded-3xl"], [class*="rounded-2xl"], [class*="rounded-xl"] { overflow: visible !important; }
                    * { transition: none !important; animation: none !important; }
                `;
                wrapper.appendChild(overrideStyle);
                wrapper.appendChild(clone);
                document.body.appendChild(wrapper);

                clone.querySelectorAll('*').forEach(el => {
                    const cls = el.className || '';
                    if (typeof cls !== 'string') return;
                    if (cls.includes('max-h-[5000px]') || cls.includes('opacity-100')) {
                        el.style.maxHeight = 'none'; el.style.overflow = 'visible'; el.style.opacity = '1';
                    }
                    if (cls.includes('rounded-3xl') || cls.includes('rounded-2xl')) el.style.overflow = 'visible';
                });

                await preloadImagesForExport(wrapper);
                await new Promise(r => setTimeout(r, 400));

                // Measure the true content extent, INCLUDING absolutely-positioned descendants
                // (e.g. the Executive Assistant card that sits to the right of the head).
                const wrapRect = wrapper.getBoundingClientRect();
                let maxRight = wrapper.scrollWidth, maxBottom = wrapper.scrollHeight;
                wrapper.querySelectorAll('*').forEach(el => {
                    const r = el.getBoundingClientRect();
                    if (r.width === 0 && r.height === 0) return;
                    const right = (r.right - wrapRect.left);
                    const bottom = (r.bottom - wrapRect.top);
                    if (right > maxRight) maxRight = right;
                    if (bottom > maxBottom) maxBottom = bottom;
                });
                const PAD = 40;
                const contentW = Math.ceil(maxRight + PAD);
                const contentH = Math.ceil(maxBottom + PAD);
                // Lock the wrapper to the measured size so html2canvas captures everything.
                wrapper.style.width = contentW + 'px';
                wrapper.style.height = contentH + 'px';

                const SCALE = 2;
                const canvas = await window.html2canvas(wrapper, {
                    backgroundColor: '#ffffff', scale: SCALE, useCORS: true, allowTaint: false, logging: false,
                    width: contentW, height: contentH, windowWidth: contentW, windowHeight: contentH,
                    x: 0, y: 0, scrollX: 0, scrollY: 0, imageTimeout: 8000,
                    onclone: (clonedDoc) => {
                        clonedDoc.querySelectorAll('[class]').forEach(el => {
                            const cls = el.className || '';
                            if (typeof cls !== 'string') return;
                            if (cls.includes('max-h-[5000px]')) { el.style.overflow='visible'; el.style.maxHeight='none'; el.style.opacity='1'; }
                        });
                    }
                });
                document.body.removeChild(wrapper);

                const DPI = 300, MM_PER_INCH = 25.4;
                const pxPerMm = DPI / MM_PER_INCH;

                // White-backed full-resolution canvas of exactly what is on screen (no shrink, no crop).
                const fullCanvas = document.createElement('canvas');
                fullCanvas.width = canvas.width;
                fullCanvas.height = canvas.height;
                const fctx = fullCanvas.getContext('2d');
                fctx.fillStyle = '#ffffff';
                fctx.fillRect(0, 0, fullCanvas.width, fullCanvas.height);
                fctx.drawImage(canvas, 0, 0);

                if (format === 'png') {
                    // Export the full chart at native resolution — pixel-for-pixel what is shown.
                    const link = document.createElement('a');
                    link.download = `${fileLabel}.png`;
                    link.href = fullCanvas.toDataURL('image/png');
                    link.click();
                } else if (format === 'pdf') {
                    if (!window.jspdf) {
                        await new Promise((res, rej) => {
                            const s = document.createElement('script');
                            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                            s.onload = res; s.onerror = rej;
                            document.head.appendChild(s);
                        });
                    }
                    const { jsPDF } = window.jspdf;

                    // Choose orientation by the chart's aspect ratio so the content uses the page best.
                    const chartLandscape = fullCanvas.width >= fullCanvas.height;
                    const pageWmm = chartLandscape ? A4.hmm : A4.wmm;
                    const pageHmm = chartLandscape ? A4.wmm : A4.hmm;
                    const MARGIN_MM = 5;
                    const printWmm = pageWmm - MARGIN_MM * 2;
                    const printHmm = pageHmm - MARGIN_MM * 2;

                    // Scale so the chart fills the printable WIDTH (keeps cards/text at a readable size),
                    // then tile vertically across as many pages as needed — nothing is cropped or squashed.
                    const mmPerPx = printWmm / fullCanvas.width;     // chart px → page mm (width-fit)
                    const fullHmm = fullCanvas.height * mmPerPx;     // total height in mm at that scale

                    const pdf = new jsPDF({ orientation: chartLandscape ? 'landscape' : 'portrait', unit: 'mm', format: 'a4' });

                    if (fullHmm <= printHmm) {
                        // Fits on a single page — center vertically.
                        const offY = MARGIN_MM + (printHmm - fullHmm) / 2;
                        pdf.addImage(fullCanvas.toDataURL('image/png'), 'PNG', MARGIN_MM, offY, printWmm, fullHmm, undefined, 'FAST');
                    } else {
                        // Multi-page: slice the chart canvas into page-height bands.
                        const bandPx = Math.floor(printHmm / mmPerPx);   // chart px per page band
                        const pages = Math.ceil(fullCanvas.height / bandPx);
                        for (let p = 0; p < pages; p++) {
                            const sy = p * bandPx;
                            const sh = Math.min(bandPx, fullCanvas.height - sy);
                            const band = document.createElement('canvas');
                            band.width = fullCanvas.width;
                            band.height = sh;
                            const bctx = band.getContext('2d');
                            bctx.fillStyle = '#ffffff';
                            bctx.fillRect(0, 0, band.width, band.height);
                            bctx.drawImage(fullCanvas, 0, sy, fullCanvas.width, sh, 0, 0, band.width, sh);
                            if (p > 0) pdf.addPage('a4', chartLandscape ? 'landscape' : 'portrait');
                            pdf.addImage(band.toDataURL('image/png'), 'PNG', MARGIN_MM, MARGIN_MM, printWmm, sh * mmPerPx, undefined, 'FAST');
                        }
                    }
                    pdf.save(`${fileLabel}.pdf`);
                }
            } catch (err) {
                console.error('Export failed:', err);
                setAlertDialog('Export failed: ' + err.message + '. Please check the browser console for details.');
            } finally {
                setIsExporting(false);
            }
        };

        // Reusable staff card — 4x6 passport-ratio photo, consistent with manager cards; drag handle for reorder
        const StaffCard = ({ s, onClick, draggable, onDragStart, onDragOver, onDrop, onDragEnd, isDragging, isDragOver }) => (

                </div>

                    <p className="text-[12px] font-extrabold text-gray-800 leading-snug break-words group-hover/staff:text-[#4a3189]" title={s.name}>{s.name}</p>
                    <p className="text-[9px] font-medium text-[#dfa634] leading-snug line-clamp-3 mt-0.5" title={s.role}>{s.role}</p>

        const ModernOrgNode = ({ node, dept, manager, staffList, children, onEmployeeClick, isEditing, onEdit, onAddMenu, onDelete, isRoot, alignDrop, exportId, onExport, onReorderStaff }) => {
            const [expanded, setExpanded] = useState(false);
            const [dragIdx, setDragIdx] = useState(null);
            const [overIdx, setOverIdx] = useState(null);
            const hasChildren = React.Children.count(children) > 0;
            const hasStaff = staffList && staffList.length > 0;
            const isEmptyNode = !manager && !hasStaff;

            if (isEmptyNode) {
                return (
                <li>
                    <div className="flex flex-col items-center relative group w-72 mx-auto h-[3rem]">
                    {isEditing && (
                        <div className="absolute -top-8 flex space-x-1 z-30">
                        <button onClick={(e) => { e.stopPropagation(); onEdit(); }} className="bg-blue-500 text-white p-1.5 rounded-full shadow-lg hover:bg-blue-600 transition" title="Edit"><Edit className="w-3 h-3" /></button>
                        <button onClick={(e) => { e.stopPropagation(); onAddMenu(); }} className="bg-green-500 text-white p-1.5 rounded-full shadow-lg hover:bg-green-600 transition" title="Add"><Plus className="w-3 h-3" /></button>
                        {!isRoot && <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="bg-red-500 text-white p-1.5 rounded-full shadow-lg hover:bg-red-600 transition" title="Delete"><Trash2 className="w-3 h-3" /></button>}
                        </div>
                    )}
                    <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-[#292c44] to-[#3a3e5c] text-white font-extrabold text-[12px] uppercase tracking-[0.2em] px-8 py-3 rounded-xl shadow-xl border border-white/10 ring-2 ring-[#dfa634]/50 z-10 w-max">
                        {dept}
                    </div>
                    </div>
                    {hasChildren && <ul>{children}</ul>}
                </li>
                )
            }

            return (
                <li>
                <div className="flex flex-col items-center">
                    {alignDrop && (
                    <div className="flex flex-col items-center w-full">
                        <div className="font-extrabold text-[12px] uppercase tracking-[0.2em] px-8 py-3 border-2 invisible pointer-events-none">SPACER</div>
                        <div className="w-[3px] h-[30px] bg-[#e2d8f0]"></div>
                    </div>
                    )}
                    <div id={exportId} className="bg-white/90 backdrop-blur-xl border border-gray-200/80 shadow-xl shadow-purple-900/10 rounded-3xl w-72 transition-all duration-300 z-10 relative flex flex-col group hover:shadow-2xl hover:-translate-y-1 mx-auto" style={{overflow:'visible'}}>

                    {isEditing && (
                        <div className="absolute -top-4 -right-4 flex space-x-1 z-30" data-html2canvas-ignore="true">
                        <button onClick={(e) => { e.stopPropagation(); onEdit(); }} className="bg-blue-500 text-white p-2 rounded-full shadow-lg hover:bg-blue-600 transition" title="Edit Department"><Edit className="w-3 h-3" /></button>
                        <button onClick={(e) => { e.stopPropagation(); onAddMenu(); }} className="bg-green-500 text-white p-2 rounded-full shadow-lg hover:bg-green-600 transition" title="Add Sub-Department or Staff"><Plus className="w-3 h-3" /></button>
                        {!isRoot && <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="bg-red-500 text-white p-2 rounded-full shadow-lg hover:bg-red-600 transition" title="Delete Department"><Trash2 className="w-3 h-3" /></button>}
                        </div>
                    )}

                    {/* Department badge + export */}
                    <div className="absolute -top-4 left-0 right-0 flex justify-center items-center gap-1 z-20">
                        <div className="bg-[#292c44] text-white font-bold text-[10px] uppercase tracking-widest px-5 py-2 rounded-full shadow-lg border border-white/10 ring-2 ring-[#dfa634]/30 whitespace-nowrap pointer-events-none">
                        {dept}
                        </div>
                        {onExport && (
                        <div className="relative group/exp pointer-events-auto export-control" data-html2canvas-ignore="true">
                            <button onClick={(e) => e.stopPropagation()} className="bg-[#dfa634] text-white w-7 h-7 rounded-full flex items-center justify-center shadow-lg border border-white/20 hover:bg-[#c9942a] transition" title="Export this department">
                            <Download className="w-3.5 h-3.5" />
                            </button>
                            <div className="absolute left-1/2 -translate-x-1/2 mt-1 w-32 bg-white border border-gray-100 rounded-xl shadow-2xl py-1.5 opacity-0 invisible group-hover/exp:opacity-100 group-hover/exp:visible transition-all z-50">
                            <button onClick={(e) => { e.stopPropagation(); onExport('png'); }} className="block w-full text-left px-4 py-1.5 text-xs text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">PNG</button>
                            <button onClick={(e) => { e.stopPropagation(); onExport('pdf'); }} className="block w-full text-left px-4 py-1.5 text-xs text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">PDF</button>
                            </div>
                        </div>
                        )}
                    </div>

                    {/* Manager (FIX #5: larger photo, FIX #2: clean text) */}
                    <div
                        onClick={(e) => { e.stopPropagation(); if(manager && onEmployeeClick) onEmployeeClick(manager); }}
                        className={`pt-10 pb-5 px-5 flex flex-col items-center rounded-t-3xl ${manager ? 'cursor-pointer' : ''}`}
                    >
                        {manager ? (
                        <>
                            <div className="relative mb-3 group-hover:scale-105 transition-transform duration-300" style={{width:'120px'}}>
                            <div className="absolute inset-0 bg-[#dfa634] rounded-xl blur-md opacity-20 group-hover:opacity-40 transition-opacity"></div>
                            <img src={manager.profilePhoto} className="relative w-[120px] h-[180px] rounded-xl object-cover shadow-sm ring-4 ring-white border border-gray-100" alt={manager.name} />
                            </div>
                            <p className="text-sm font-extrabold text-gray-800 w-full text-center leading-snug group-hover:text-[#4a3189] transition-colors break-words">{manager.name}</p>
                            <p className="text-[10px] font-bold text-[#dfa634] w-full text-center mt-1 uppercase tracking-wide leading-snug break-words line-clamp-2">{manager.role}</p>
                        </>
                        ) : null}
                    </div>

                    {/* Staff panel — FIX #6: single vertical column, drag to reorder */}
                    {hasStaff && (
                        <div className={`transition-all duration-300 ease-in-out ${expanded ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}`} style={{overflow: expanded ? 'visible' : 'hidden'}}>
                        <div className="flex flex-col items-center w-full px-3 pb-8 pt-4 border-t border-gray-100/60 bg-gray-50/50 rounded-b-3xl">
                            {isEditing && (
                                <div className="text-[9px] font-bold text-[#4a3189] uppercase tracking-widest mb-3 bg-purple-100/50 px-3 py-1 rounded-full border border-purple-200/50" data-html2canvas-ignore="true">
                                    Drag to set reporting order
                                </div>
                            )}
                            <div className="flex flex-col items-center gap-2 w-full">
                            {staffList.map((s, idx) => (
                                <React.Fragment key={s.id || idx}>
                                {idx > 0 && <div className="w-[2px] h-3 bg-[#e2d8f0]"></div>}
                                <StaffCard
                                    s={s}
                                    onClick={onEmployeeClick}
                                    draggable={isEditing}
                                    isDragging={dragIdx === idx}
                                    isDragOver={overIdx === idx && dragIdx !== null && dragIdx !== idx}
                                    onDragStart={(e) => { setDragIdx(idx); e.dataTransfer.effectAllowed = 'move'; }}
                                    onDragOver={(e) => { if (dragIdx !== null) { e.preventDefault(); setOverIdx(idx); } }}
                                    onDrop={(e) => {
                                        e.preventDefault();
                                        if (dragIdx === null || dragIdx === idx) { setDragIdx(null); setOverIdx(null); return; }
                                        const reordered = [...staffList];
                                        const [moved] = reordered.splice(dragIdx, 1);
                                        reordered.splice(idx, 0, moved);
                                        if (onReorderStaff) onReorderStaff(reordered.map(x => x.name));
                                        setDragIdx(null); setOverIdx(null);
                                    }}
                                    onDragEnd={() => { setDragIdx(null); setOverIdx(null); }}
                                />
                                </React.Fragment>
                            ))}
                            </div>
                        </div>
                        </div>
                    )}

                    {hasStaff && (
                        <div
                        onClick={(e) => { e.stopPropagation(); setExpanded(!expanded); }}
                        className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 z-20 cursor-pointer"
                        data-html2canvas-ignore="true"
                        >
                        <div className="bg-white border border-gray-200 text-gray-400 hover:text-[#4a3189] hover:border-[#4a3189] w-8 h-8 rounded-full flex items-center justify-center shadow-md transition-all hover:scale-110">
                            {expanded ? <ChevronDown className="w-4 h-4" /> : <ChevronRight className="w-4 h-4 transform rotate-90" />}
                        </div>
                        </div>
                    )}
                    </div>
                </div>

                {hasChildren && (<ul>{children}</ul>)}
                </li>
            );
        };

        function App() {
            // ─── Multi-chart state (FIX #7) ──────────────────────────────────────────
            const [charts, setCharts] = useState({ main: { name: 'ELA Education', tree: defaultOrgData } });
            const [activeChartId, setActiveChartId] = useState('main');
            const [allEmployeesList, setAllEmployeesList] = useState(defaultEmployeesList);
            const [isDbLoading, setIsDbLoading] = useState(true);

            const orgData = charts[activeChartId]?.tree || defaultOrgData;

            const [isEditingOrg, setIsEditingOrg] = useState(false);
            const [editingOrgNode, setEditingOrgNode] = useState(null);
            const [orgNodeForm, setOrgNodeForm] = useState({ id: '', dept: '', managerName: '', staffNames: [] });
            const [selectedEmployeeProfile, setSelectedEmployeeProfile] = useState(null);
            const [pendingPhoto, setPendingPhoto] = useState(null); // FIX #4: hold uploaded photo until Save
            const [isUploadingPhoto, setIsUploadingPhoto] = useState(false);
            const [addMenuConfig, setAddMenuConfig] = useState(null);
            const [newEmployeeForm, setNewEmployeeForm] = useState(null);
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [alertDialog, setAlertDialog] = useState(null);
            const [isExporting, setIsExporting] = useState(false);
            const [assistantForm, setAssistantForm] = useState(null);
            const [showCardLibrary, setShowCardLibrary] = useState(false);   // FIX #8
            const [newChartName, setNewChartName] = useState(null);          // FIX #7
            const [librarySearch, setLibrarySearch] = useState('');

            const [orgZoomLevel, setOrgZoomLevel] = useState(0.85);
            const [orgPan, setOrgPan] = useState({ x: 0, y: 0 });
            const [isDraggingOrg, setIsDraggingOrg] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [activeOrgTab, setActiveOrgTab] = useState('Overall Structure');

            // ─── Cloud load (charts doc + employees doc) ─────────────────────────────
            useEffect(() => {
                if (!window.firebaseReady) { setIsDbLoading(false); return; }
                const docRef = window.doc(window.db, 'orgChart', 'main');
                const unsubscribe = window.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        // Backward-compatible: old shape had {tree, employees}
                        if (data.charts) {
                            setCharts(data.charts);
                            setActiveChartId(prev => data.charts[prev] ? prev : Object.keys(data.charts)[0]);
                        } else if (data.tree) {
                            setCharts({ main: { name: 'ELA Education', tree: data.tree } });
                        }
                        if (data.employees) setAllEmployeesList(data.employees);
                        setIsDbLoading(false);
                    } else {
                        window.setDoc(docRef, {
                            charts: { main: { name: 'ELA Education', tree: defaultOrgData } },
                            employees: defaultEmployeesList
                        }).then(() => setIsDbLoading(false));
                    }
                });
                return () => unsubscribe();
            }, []);

            // Persist charts + employees. Pass overrides to avoid stale state.
            const saveAll = (newCharts, newEmployees) => {
                const finalCharts = newCharts || charts;
                const finalEmps = newEmployees || allEmployeesList;
                if (newCharts) setCharts(finalCharts);
                if (newEmployees) setAllEmployeesList(finalEmps);
                if (window.firebaseReady) {
                    window.setDoc(window.doc(window.db, 'orgChart', 'main'), {
                        charts: finalCharts, employees: finalEmps
                    }).catch(err => {
                        console.error("Firebase Save Error:", err);
                        setAlertDialog("Failed to save to cloud database. Ensure Firebase security rules are set to test mode.");
                    });
                }
            };

            // Save a modified tree for the active chart.
            const saveTree = (newTree) => {
                const newCharts = { ...charts, [activeChartId]: { ...charts[activeChartId], tree: newTree } };
                saveAll(newCharts, null);
            };
            const saveEmployees = (newEmps) => saveAll(null, newEmps);

            const orgTabs = useMemo(() => ['Overall Structure', ...(orgData?.children?.map(c => c.dept) || [])], [orgData]);

            const updateNode = (tree, id, data) => {
                if (tree.id === id) return { ...tree, ...data };
                if (tree.children) return { ...tree, children: tree.children.map(c => updateNode(c, id, data)) };
                return tree;
            };
            const addNode = (tree, parentId, newNode) => {
                if (tree.id === parentId) return { ...tree, children: [...(tree.children || []), newNode] };
                if (tree.children) return { ...tree, children: tree.children.map(c => addNode(c, parentId, newNode)) };
                return tree;
            };
            const deleteNode = (tree, id) => {
                if (tree.children) return { ...tree, children: tree.children.filter(c => c.id !== id).map(c => deleteNode(c, id)) };
                return tree;
            };
            const setStaffOrder = (tree, id, newStaffNames) => {
                if (tree.id === id) return { ...tree, staffNames: newStaffNames };
                if (tree.children) return { ...tree, children: tree.children.map(c => setStaffOrder(c, id, newStaffNames)) };
                return tree;
            };

            const getEmployeesInBranch = (node) => {
                let names = [node.managerName, node.assistantName, ...(node.staffNames || [])].filter(Boolean);
                if (node.children) node.children.forEach(c => { names = names.concat(getEmployeesInBranch(c)); });
                return names;
            };

            const getOrgTabStats = (tabName, specificBranch = null) => {
                let emps = allEmployeesList;
                if (tabName !== 'Overall Structure') {
                    const branch = orgData.children.find(c => c.dept === tabName);
                    if (branch) {
                        const namesInBranch = getEmployeesInBranch(branch);
                        emps = emps.filter(e => namesInBranch.includes(e.name));
                    }
                }
                if (specificBranch) emps = emps.filter(e => e.branchOffice === specificBranch);
                return { total: emps.length, male: emps.filter(e => e.gender === 'Male').length, female: emps.filter(e => e.gender === 'Female').length };
            };

            const getEmp = (name) => allEmployeesList.find(e => e.name === name) || { name, role: 'Unknown', profilePhoto: `https://i.pravatar.cc/150?u=${encodeURIComponent(name)}` };
            const getStaff = (names) => names.map(getEmp);

            const rootManager = getEmp(orgData.managerName);
            const rootAssistant = orgData.assistantName ? getEmp(orgData.assistantName) : null;

            // FIX #4: upload stages a pending photo; user must press Save to commit.
            const handlePhotoStage = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.match(/^image\/(jpeg|jpg|png)$/i)) {
                    setAlertDialog("Please upload a PNG or JPEG image file only.");
                    e.target.value = ''; return;
                }
                setIsUploadingPhoto(true);
                processImageFile(file, (base64) => { setPendingPhoto(base64); setIsUploadingPhoto(false); });
                e.target.value = '';
            };
            const handlePhotoSave = () => {
                if (!pendingPhoto || !selectedEmployeeProfile) return;
                const newEmps = allEmployeesList.map(emp => emp.id === selectedEmployeeProfile.id ? { ...emp, profilePhoto: pendingPhoto } : emp);
                saveEmployees(newEmps);
                setSelectedEmployeeProfile(prev => ({ ...prev, profilePhoto: pendingPhoto }));
                setPendingPhoto(null);
            };
            const handlePhotoDelete = (emp) => {
                setConfirmDialog({
                    message: `Remove the current photo for ${emp.name}? They will revert to their default avatar.`,
                    confirmLabel: 'Remove Photo', confirmClass: 'bg-orange-500 hover:bg-orange-600',
                    onConfirm: () => {
                        const fallbackPhoto = emp.defaultPhoto || `https://i.pravatar.cc/150?u=${encodeURIComponent(emp.name)}`;
                        const newEmps = allEmployeesList.map(e => e.id === emp.id ? { ...e, profilePhoto: fallbackPhoto } : e);
                        saveEmployees(newEmps);
                        setSelectedEmployeeProfile(prev => ({ ...prev, profilePhoto: fallbackPhoto }));
                        setPendingPhoto(null);
                        setConfirmDialog(null);
                    }
                });
            };

            // FIX #8: create a brand-new employee card stored in the shared library.
            const makeEmployee = (form) => {
                const newId = `EMP${Date.now().toString(36).toUpperCase()}`;
                const defaultAvatar = form.profilePhoto || `https://randomuser.me/api/portraits/${form.gender === 'Female' ? 'women' : 'men'}/${Math.floor(Math.random() * 90) + 1}.jpg`;
                return {
                    id: newId, name: form.name, role: form.role,
                    gender: form.gender || 'Other', dept: form.dept || 'Unassigned',
                    email: form.email || `${form.name.toLowerCase().replace(/\s+/g, '')}@company.com`,
                    contactNumber: form.contactNumber || 'TBD', branchOffice: form.branchOffice || 'HQ',
                    insurance: form.insurance || 'Staff member', joinDate: new Date().toISOString().split('T')[0],
                    profilePhoto: defaultAvatar, defaultPhoto: defaultAvatar
                };
            };

            const handleAddNewEmployee = () => {
                if (!newEmployeeForm.name || !newEmployeeForm.role) { setAlertDialog("Name and Role are required."); return; }
                const newEmp = makeEmployee(newEmployeeForm);
                const newEmps = [...allEmployeesList, newEmp];
                if (newEmployeeForm.parentId) {
                    const appendStaff = (tree) => {
                        if (tree.id === newEmployeeForm.parentId) return { ...tree, staffNames: [...(tree.staffNames || []), newEmp.name] };
                        if (tree.children) return { ...tree, children: tree.children.map(appendStaff) };
                        return tree;
                    };
                    const newTree = appendStaff(orgData);
                    const newCharts = { ...charts, [activeChartId]: { ...charts[activeChartId], tree: newTree } };
                    saveAll(newCharts, newEmps);
                    setAlertDialog(`${newEmp.name} added to the chart and saved to the card library.`);
                } else {
                    saveEmployees(newEmps);
                    setAlertDialog(`${newEmp.name} saved to the card library for reuse.`);
                }
                setNewEmployeeForm(null);
            };

            // FIX #8: duplicate an existing library card.
            const duplicateEmployee = (emp) => {
                const copy = makeEmployee({ ...emp, name: `${emp.name} (Copy)` });
                saveEmployees([...allEmployeesList, copy]);
            };
            const deleteLibraryEmployee = (emp) => {
                setConfirmDialog({
                    message: `Delete card "${emp.name}" from the library? This also removes them from every chart.`,
                    confirmLabel: 'Delete Card', confirmClass: 'bg-red-500 hover:bg-red-600',
                    onConfirm: () => {
                        const newEmps = allEmployeesList.filter(e => e.id !== emp.id);
                        const removeFrom = (tree) => {
                            let u = { ...tree };
                            if (u.managerName === emp.name) u.managerName = null;
                            if (u.assistantName === emp.name) u.assistantName = null;
                            if (u.staffNames) u.staffNames = u.staffNames.filter(n => n !== emp.name);
                            if (u.children) u.children = u.children.map(removeFrom);
                            return u;
                        };
                        const newCharts = {};
                        Object.entries(charts).forEach(([id, c]) => { newCharts[id] = { ...c, tree: removeFrom(c.tree) }; });
                        saveAll(newCharts, newEmps);
                        setConfirmDialog(null);
                    }
                });
            };

            const handleSaveAssistant = () => {
                if (!assistantForm) return;
                const newTree = updateNode(orgData, assistantForm.nodeId, { assistantName: assistantForm.assistantName || null });
                saveTree(newTree);
                setAssistantForm(null);
            };

            // Strip all people from a tree but keep the department/structure skeleton (names/photos/positions empty).
            const blankifyTree = (node, isRoot = false) => {
                const fresh = {
                    id: isRoot ? 'root' : `node_${Math.random().toString(36).slice(2, 9)}`,
                    dept: node.dept,
                    managerName: null,
                    staffNames: [],
                    children: (node.children || []).map(c => blankifyTree(c, false))
                };
                if (isRoot) fresh.assistantName = null;
                return fresh;
            };

            // Create a new chart.
            //  mode 'default'  → clone the DEFAULT org structure (departments preserved) with all people blank.
            //  mode 'current'  → clone the CURRENTLY shown chart's structure with all people blank.
            //  mode 'blank'    → a single empty root only.
            // All modes reuse the shared card library.
            const createChart = (name, mode = 'default') => {
                const id = `chart_${Date.now().toString(36)}`;
                let tree;
                if (mode === 'default') {
                    tree = blankifyTree(defaultOrgData, true);
                } else if (mode === 'current') {
                    tree = blankifyTree(orgData, true);
                } else {
                    tree = { id: 'root', dept: 'Executive Management', managerName: null, assistantName: null, staffNames: [], children: [] };
                }
                const newCharts = { ...charts, [id]: { name: name || 'New Organization', tree } };
                saveAll(newCharts, null);
                setActiveChartId(id);
                setActiveOrgTab('Overall Structure');
                setNewChartName(null);
            };
            const deleteChart = (id) => {
                if (Object.keys(charts).length <= 1) { setAlertDialog("You must keep at least one chart."); return; }
                setConfirmDialog({
                    message: `Delete the chart "${charts[id].name}"? The employee cards remain in the library.`,
                    confirmLabel: 'Delete Chart', confirmClass: 'bg-red-500 hover:bg-red-600',
                    onConfirm: () => {
                        const newCharts = { ...charts }; delete newCharts[id];
                        const fallback = Object.keys(newCharts)[0];
                        saveAll(newCharts, null);
                        setActiveChartId(fallback);
                        setActiveOrgTab('Overall Structure');
                        setConfirmDialog(null);
                    }
                });
            };

            const exportDepartment = (node, format) => {
                handleExport(format, setIsExporting, setAlertDialog, `dept-export-${node.id}`, `${(charts[activeChartId]?.name || 'Org').replace(/[^a-z0-9]+/gi,'_')}_${(node.dept || 'Department').replace(/[^a-z0-9]+/gi, '_')}`);
            };

            const renderOrgTree = (node, level = 1) => {
                const manager = node.managerName ? getEmp(node.managerName) : null;
                const staff = getStaff(node.staffNames || []);
                return (
                <ModernOrgNode
                    key={node.id} node={node} dept={node.dept} manager={manager} staffList={staff}
                    exportId={`dept-export-${node.id}`}
                    onExport={(fmt) => exportDepartment(node, fmt)}
                    onEmployeeClick={(emp) => { setSelectedEmployeeProfile(emp); setPendingPhoto(null); }}
                    onReorderStaff={(names) => { const newTree = setStaffOrder(orgData, node.id, names); saveTree(newTree); }}
                    isEditing={isEditingOrg} isRoot={false}
                    onEdit={() => { setEditingOrgNode(node.id); setOrgNodeForm({ id: node.id, dept: node.dept, managerName: node.managerName || '', staffNames: node.staffNames || [], assistantName: node.assistantName || '' }); }}
                    onAddMenu={() => { setAddMenuConfig({ parentId: node.id, deptName: node.dept }); }}
                    onDelete={() => {
                        setConfirmDialog({
                            message: `Are you sure you want to delete ${node.dept} and all its sub-departments?`,
                            confirmLabel: 'Delete', confirmClass: 'bg-red-500 hover:bg-red-600',
                            onConfirm: () => { const newTree = deleteNode(orgData, node.id); saveTree(newTree); setConfirmDialog(null); }
                        });
                    }}
                >
                    {node.children && node.children.length > 0 && node.children.map(child => renderOrgTree(child, level + 1))}
                </ModernOrgNode>
                );
            };

            if (isDbLoading) {
                return (
                    <div className="flex flex-col h-screen bg-[#f4f7fa] items-center justify-center">
                        <Loader2 className="w-12 h-12 text-[#dfa634] animate-spin mb-4" />
                        <h2 className="text-xl font-bold text-gray-800">Connecting to Cloud Database...</h2>
                        <p className="text-gray-500 text-sm mt-2">Loading organization structure</p>
                    </div>
                );
            }

            const libraryFiltered = allEmployeesList.filter(e =>
                !librarySearch || e.name.toLowerCase().includes(librarySearch.toLowerCase()) || (e.role || '').toLowerCase().includes(librarySearch.toLowerCase())
            );

            return (
                <div className="flex flex-col h-screen bg-[#f4f7fa] font-sans relative">

                {isExporting && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center">
                        <Loader2 className="w-14 h-14 text-[#dfa634] animate-spin mb-5" />
                        <h2 className="text-xl font-bold text-white">Preparing Export…</h2>
                        <p className="text-white/70 text-sm mt-2">Rendering current view to an A4 print-quality page. Please wait.</p>
                    </div>
                )}

                <header className="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-20 flex-shrink-0 relative">
                    <div className="flex items-center">
                    <div className="w-10 h-10 bg-gradient-to-br from-[#4a3189] to-[#6d48c7] rounded-md flex items-center justify-center mr-3 shadow-md">
                        <span className="text-white font-black text-sm tracking-widest">ELA</span>
                    </div>
                    <h1 className="text-xl font-extrabold text-gray-800 tracking-tight">Interactive <span className="text-[#dfa634]">Org Chart</span></h1>
                    </div>
                    <div className="flex items-center space-x-4">
                    {/* FIX #7: chart selector */}
                    <div className="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-xl border border-gray-200">
                        <LayoutGrid className="w-4 h-4 text-[#4a3189]" />
                        <select value={activeChartId}
                            onChange={(e) => { setActiveChartId(e.target.value); setActiveOrgTab('Overall Structure'); setOrgPan({x:0,y:0}); }}
                            className="bg-transparent text-sm font-bold text-gray-700 outline-none cursor-pointer max-w-[180px]">
                            {Object.entries(charts).map(([id, c]) => <option key={id} value={id}>{c.name}</option>)}
                        </select>
                        <button onClick={() => setNewChartName('')} className="text-[#4a3189] hover:text-[#38236b]" title="New organization chart"><FolderPlus className="w-4 h-4" /></button>
                        {Object.keys(charts).length > 1 && (
                            <button onClick={() => deleteChart(activeChartId)} className="text-red-400 hover:text-red-600" title="Delete this chart"><Trash2 className="w-4 h-4" /></button>
                        )}
                    </div>
                    <button onClick={() => setShowCardLibrary(true)} className="flex items-center space-x-2 bg-purple-50 px-3 py-1.5 rounded-xl border border-purple-100 text-[#4a3189] font-bold text-sm hover:bg-purple-100 transition" title="Open reusable card library">
                        <Library className="w-4 h-4" /> <span>Card Library</span>
                    </button>
                    {window.firebaseReady ? (
                        <div className="flex items-center space-x-2 bg-green-50 px-3 py-1.5 rounded-full border border-green-100 shadow-inner">
                            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span className="text-xs font-bold text-green-700">Cloud Sync</span>
                        </div>
                    ) : (
                        <div className="flex items-center space-x-2 bg-yellow-50 px-3 py-1.5 rounded-full border border-yellow-100 shadow-inner">
                            <div className="w-2 h-2 rounded-full bg-yellow-500"></div>
                            <span className="text-xs font-bold text-yellow-700">Local Mode</span>
                        </div>
                    )}
                    </div>
                </header>

                <main className="flex-1 flex flex-col overflow-hidden p-6 max-w-[1600px] mx-auto w-full">

                    <div className="flex flex-col bg-white p-4 rounded-2xl shadow-sm border border-gray-100/80 space-y-4 z-10 relative">
                    <div className="flex items-center justify-between">
                        <div>
                        <h2 className="text-xl font-bold text-gray-800 flex items-center">
                            <Network className="w-5 h-5 mr-2 text-[#dfa634]" /> {charts[activeChartId]?.name} · Structure

                        <div className="flex items-center space-x-1 bg-gray-50 rounded-xl p-1 border border-gray-200 shadow-inner">
                            <button onClick={() => setOrgZoomLevel(z => Math.max(z - 0.1, 0.3))} className="p-2 bg-white shadow-sm rounded-lg text-gray-600 hover:text-[#4a3189] hover:bg-purple-50 transition" title="Zoom Out"><Minus className="w-4 h-4" /></button>
                            <button onClick={() => { setOrgZoomLevel(0.85); setOrgPan({ x: 0, y: 0 }); }} className="px-3 py-2 text-xs font-bold text-gray-700 hover:text-[#4a3189] transition w-16 text-center" title="Reset">{Math.round(orgZoomLevel * 100)}%</button>
                            <button onClick={() => setOrgZoomLevel(z => Math.min(z + 0.1, 2.5))} className="p-2 bg-white shadow-sm rounded-lg text-gray-600 hover:text-[#4a3189] hover:bg-purple-50 transition" title="Zoom In"><Plus className="w-4 h-4" /></button>
                        </div>

                        {activeOrgTab === 'Overall Structure' && (
                            <button onClick={() => setAssistantForm({ nodeId: orgData.id, assistantName: orgData.assistantName || '' })}
                                className="px-4 py-2.5 bg-white shadow-sm border border-gray-200 text-gray-700 rounded-xl text-sm font-bold flex items-center transition-all hover:border-[#4a3189]/50 hover:bg-purple-50/50 hover:shadow-md"
                                title="Add or edit Executive Assistant">
                                <UserPlus className="w-4 h-4 mr-2 text-[#4a3189]" />
                                {orgData.assistantName ? 'Edit Assistant' : 'Add Assistant'}
                            </button>
                        )}

                        <button onClick={() => setIsEditingOrg(!isEditingOrg)}
                            className={`px-5 py-2.5 shadow-sm border rounded-xl text-sm font-bold flex items-center transition-all ${isEditingOrg ? 'bg-[#4a3189] text-white border-[#4a3189] hover:bg-[#38236b] shadow-purple-900/20' : 'bg-white border-gray-200 text-gray-700 hover:border-[#dfa634]/50 hover:bg-yellow-50/50 hover:shadow-md'}`}>
                            {isEditingOrg ? <><Save className="w-4 h-4 mr-2" /> Done Editing</> : <><Edit className="w-4 h-4 mr-2" /> Edit Structure</>}
                        </button>

                        <div className="relative group">
                            <button disabled={isExporting} className="px-5 py-2.5 bg-gradient-to-r from-[#dfa634] to-[#f5c76a] text-white shadow-lg shadow-yellow-600/20 rounded-xl text-sm font-bold flex items-center transition hover:scale-105 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:scale-100">
                                {isExporting ? <Loader2 className="w-4 h-4 mr-2 animate-spin" /> : <Download className="w-4 h-4 mr-2" />} Export
                            </button>
                            {!isExporting && (
                                <div className="absolute right-0 mt-2 w-60 bg-white border border-gray-100 rounded-xl shadow-2xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top-right z-50">
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider px-4 pt-1 pb-2">Full size · no cropping · PDF tiles to A4</p>
                                    <button onClick={() => handleExport('png', setIsExporting, setAlertDialog, 'org-chart-export-area', (charts[activeChartId]?.name||'Org').replace(/[^a-z0-9]+/gi,'_'))} className="block w-full text-left px-5 py-2 text-sm text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">Export as PNG (A4)</button>
                                    <button onClick={() => handleExport('pdf', setIsExporting, setAlertDialog, 'org-chart-export-area', (charts[activeChartId]?.name||'Org').replace(/[^a-z0-9]+/gi,'_'))} className="block w-full text-left px-5 py-2 text-sm text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">Export as PDF (A4)</button>
                                </div>
                            )}
                        </div>
                        </div>
                    </div>

                    <div className="flex space-x-4 overflow-x-auto pb-6 pt-3 px-2 custom-scrollbar">
                        {orgTabs.map(tab => {
                        const stat = getOrgTabStats(tab);
                        const isActive = activeOrgTab === tab;
                        const isOverall = tab === 'Overall Structure';
                        return (
                            <div key={tab}
                            onClick={() => { setActiveOrgTab(tab); setOrgPan({ x: 0, y: 0 }); setOrgZoomLevel(0.85); }}
                            className={`flex-shrink-0 cursor-pointer px-5 py-4 w-[250px] rounded-2xl transition-all duration-300 border relative overflow-hidden ${isActive ? 'bg-[#292c44] text-white shadow-xl shadow-[#292c44]/30 scale-[1.02] border-transparent z-10' : 'bg-white text-gray-600 hover:border-[#dfa634]/50 hover:shadow-lg border-gray-200'}`}>
                            {isActive && <div className="absolute -right-6 -top-6 w-24 h-24 bg-[#dfa634]/20 rounded-full blur-2xl"></div>}
                            <div className="relative z-10">
                                <div className="flex items-center space-x-3 mb-3">
                                <div className={`p-2 rounded-lg ${isActive ? 'bg-white/10' : 'bg-purple-50'}`}>
                                    {isOverall ? <Network className={`w-5 h-5 ${isActive ? 'text-[#dfa634]' : 'text-[#4a3189]'}`} /> : <Briefcase className={`w-5 h-5 ${isActive ? 'text-[#dfa634]' : 'text-[#4a3189]'}`} />}
                                </div>
                                <h4 className={`text-sm font-black truncate ${isActive ? 'text-white' : 'text-gray-800'}`}>{tab}</h4>
                                </div>
                                {tab === 'Student Placement' ? (
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center text-[10px]">
                                        <span className={`font-bold ${isActive ? 'text-gray-300' : 'text-[#4a3189]'}`}>Phnom Penh</span>
                                        <span className={isActive ? 'text-white/90' : 'text-gray-500'}><strong className={`text-[12px] ${isActive ? 'text-white' : 'text-gray-800'}`}>{getOrgTabStats(tab, 'Phnom Penh HQ').total}</strong> <span className="opacity-75">(M:{getOrgTabStats(tab, 'Phnom Penh HQ').male} F:{getOrgTabStats(tab, 'Phnom Penh HQ').female})</span></span>
                                    </div>
                                    <div className="flex justify-between items-center text-[10px]">
                                        <span className={`font-bold ${isActive ? 'text-gray-300' : 'text-[#4a3189]'}`}>Siem Reap</span>
                                        <span className={isActive ? 'text-white/90' : 'text-gray-500'}><strong className={`text-[12px] ${isActive ? 'text-white' : 'text-gray-800'}`}>{getOrgTabStats(tab, 'Siem Reap Branch').total}</strong> <span className="opacity-75">(M:{getOrgTabStats(tab, 'Siem Reap Branch').male} F:{getOrgTabStats(tab, 'Siem Reap Branch').female})</span></span>
                                    </div>
                                </div>
                                ) : (
                                <div className="flex items-center justify-between text-[11px] mt-1 pt-3 border-t border-gray-100/20">
                                    <span className={isActive ? 'text-white/80' : 'text-gray-500'}>Total Staff: <strong className={`text-sm ml-1 ${isActive ? 'text-white' : 'text-[#4a3189]'}`}>{stat.total}</strong></span>
                                    <div className={`flex items-center space-x-2 px-2 py-0.5 rounded ${isActive ? 'bg-white/10' : 'bg-gray-50'}`}>
                                    <span className={isActive ? 'text-blue-200' : 'text-blue-600'} title="Male"><User className="w-3 h-3 inline mr-0.5"/>{stat.male}</span>
                                    <span className={isActive ? 'text-pink-200' : 'text-pink-600'} title="Female"><User className="w-3 h-3 inline mr-0.5"/>{stat.female}</span>
                                    </div>
                                </div>
                                )}
                            </div>
                            </div>
                        )
                        })}
                    </div>
                    </div>

                    <div className={`flex-1 mt-6 relative bg-white rounded-3xl shadow-inner overflow-hidden border border-gray-200/60 flex items-start pt-16 ${isDraggingOrg ? 'cursor-grabbing' : 'cursor-grab'}`}
                    onWheel={(e) => { const delta = e.deltaY > 0 ? -0.05 : 0.05; setOrgZoomLevel(z => Math.min(Math.max(0.3, z + delta), 2.5)); }}
                    onMouseDown={(e) => { setIsDraggingOrg(true); setDragStart({ x: e.clientX - orgPan.x, y: e.clientY - orgPan.y }); }}
                    onMouseMove={(e) => { if (!isDraggingOrg) return; setOrgPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y }); }}
                    onMouseUp={() => setIsDraggingOrg(false)} onMouseLeave={() => setIsDraggingOrg(false)}>
                    <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '40px 40px', opacity: 0.3, pointerEvents: 'none' }}></div>

                    <style>{`
                        .modern-tree ul { padding-top: 30px; position: relative; display: flex; justify-content: center; }
                        .modern-tree li { flex: 1; float: left; text-align: center; list-style-type: none; position: relative; padding: 30px 10px 0 10px; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; }
                        .modern-tree li::before, .modern-tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 3px solid #e2d8f0; width: 50%; height: 30px; z-index: 0; }
                        .modern-tree li::after { right: auto; left: 50%; border-left: 3px solid #e2d8f0; }
                        .modern-tree li:only-child::after, .modern-tree li:only-child::before { display: none; }
                        .modern-tree li:only-child { padding-top: 0; }
                        .modern-tree li:first-child::before, .modern-tree li:last-child::after { border: 0 none; }
                        .modern-tree li:last-child::before { border-right: 3px solid #e2d8f0; border-radius: 0 16px 0 0; }
                        .modern-tree li:first-child::after { border-radius: 16px 0 0 0; }
                        .modern-tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 3px solid #e2d8f0; width: 0; height: 30px; transform: translateX(-50%); z-index: 0; }
                        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
                        .no-select { user-select: none; -webkit-user-select: none; }
                        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
                    `}</style>

                    <div className="min-w-max w-full px-10 pb-[500px] flex justify-center origin-top no-select z-10"
                        style={{ transform: `translate(${orgPan.x}px, ${orgPan.y}px) scale(${orgZoomLevel})`, transition: isDraggingOrg ? 'none' : 'transform 0.1s ease-out' }}>
                        <div className="modern-tree inline-block p-12" id="org-chart-export-area">
                        <ul>
                            {activeOrgTab === 'Overall Structure' ? (
                            (orgData.managerName || (orgData.children && orgData.children.length)) ? (
                            <li>
                                <div className="flex flex-col items-center">
                                {/* Head (Country Director) with Executive Assistant to the RIGHT, joined by a reporting line */}
                                <div className="relative flex justify-center w-full">
                                <div id="dept-export-root" className="z-10 relative group cursor-pointer hover:-translate-y-1 transition-transform duration-300 mx-auto w-72" onClick={() => { if(rootManager) { setSelectedEmployeeProfile(rootManager); setPendingPhoto(null); } }}>
                                    {isEditingOrg && (
                                    <div className="absolute -top-4 -right-4 flex space-x-1 z-30" data-html2canvas-ignore="true">
                                        <button onClick={(e) => { e.stopPropagation(); setEditingOrgNode(orgData.id); setOrgNodeForm({ id: orgData.id, dept: orgData.dept, managerName: orgData.managerName || '', staffNames: orgData.staffNames || [], assistantName: orgData.assistantName || '' }); }} className="bg-blue-500 text-white p-2 rounded-full shadow-lg hover:bg-blue-600 transition" title="Edit Department"><Edit className="w-3 h-3" /></button>
                                        <button onClick={(e) => { e.stopPropagation(); setAddMenuConfig({ parentId: orgData.id, deptName: orgData.dept }); }} className="bg-green-500 text-white p-2 rounded-full shadow-lg hover:bg-green-600 transition" title="Add"><Plus className="w-3 h-3" /></button>
                                    </div>
                                    )}
                                    <div className="absolute -top-4 left-0 right-0 flex justify-center items-center gap-1 z-20">
                                    <div className="bg-[#292c44] text-white font-bold text-[10px] uppercase tracking-widest px-5 py-2 rounded-full shadow-lg border border-white/10 ring-2 ring-[#dfa634]/30 whitespace-nowrap pointer-events-none">{orgData.dept}</div>
                                    <div className="relative group/exp pointer-events-auto" data-html2canvas-ignore="true">
                                        <button onClick={(e) => e.stopPropagation()} className="bg-[#dfa634] text-white w-7 h-7 rounded-full flex items-center justify-center shadow-lg border border-white/20 hover:bg-[#c9942a] transition" title="Export this department"><Download className="w-3.5 h-3.5" /></button>
                                        <div className="absolute left-1/2 -translate-x-1/2 mt-1 w-32 bg-white border border-gray-100 rounded-xl shadow-2xl py-1.5 opacity-0 invisible group-hover/exp:opacity-100 group-hover/exp:visible transition-all z-50">
                                        <button onClick={(e) => { e.stopPropagation(); handleExport('png', setIsExporting, setAlertDialog, 'dept-export-root', `${(charts[activeChartId]?.name||'Org').replace(/[^a-z0-9]+/gi,'_')}_Executive`); }} className="block w-full text-left px-4 py-1.5 text-xs text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">PNG</button>
                                        <button onClick={(e) => { e.stopPropagation(); handleExport('pdf', setIsExporting, setAlertDialog, 'dept-export-root', `${(charts[activeChartId]?.name||'Org').replace(/[^a-z0-9]+/gi,'_')}_Executive`); }} className="block w-full text-left px-4 py-1.5 text-xs text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">PDF</button>
                                        </div>
                                    </div>
                                    </div>
                                    {orgData.managerName ? (
                                    <div className="bg-white/90 backdrop-blur-xl border border-gray-200/80 shadow-xl shadow-purple-900/10 rounded-3xl pt-10 pb-5 px-5 w-72 flex items-center flex-col relative group-hover:shadow-2xl transition-all" style={{overflow:'visible'}}>
                                    <div className="relative mb-3 group-hover:scale-105 transition-transform duration-300" style={{width:'120px'}}>
                                        <div className="absolute inset-0 bg-[#dfa634] rounded-xl blur-md opacity-20 group-hover:opacity-40 transition-opacity"></div>
                                        <img src={rootManager.profilePhoto} className="relative w-[120px] h-[180px] rounded-xl object-cover shadow-sm ring-4 ring-white border border-gray-100" alt={rootManager.name} />
                                    </div>
                                    <p className="text-sm font-extrabold text-gray-800 hover:text-[#4a3189] transition-colors w-full text-center leading-snug break-words">{rootManager.name}</p>
                                    <p className="text-[10px] font-bold text-[#dfa634] uppercase tracking-wide mt-1 w-full text-center leading-snug break-words line-clamp-2">{rootManager.role}</p>
                                    </div>
                                    ) : (
                                    <div className="bg-white/90 border border-dashed border-gray-300 rounded-3xl pt-12 pb-6 px-5 w-72 flex items-center flex-col">
                                        <p className="text-sm font-bold text-gray-400">No head assigned</p>
                                        {isEditingOrg && <button onClick={(e)=>{e.stopPropagation(); setEditingOrgNode(orgData.id); setOrgNodeForm({ id: orgData.id, dept: orgData.dept, managerName: '', staffNames: orgData.staffNames || [], assistantName: orgData.assistantName || '' });}} className="mt-2 text-xs font-bold text-[#4a3189]">Assign head</button>}
                                    </div>
                                    )}

                                    {/* Executive Assistant — positioned to the RIGHT of the head, joined by a horizontal reporting line */}
                                    {rootAssistant && (
                                    <div className="absolute top-1/2 left-full -translate-y-1/2 flex items-center" style={{zIndex:15}}>
                                        {/* horizontal reporting line */}
                                        <div className="h-[3px] w-12 bg-[#e2d8f0]"></div>
                                        <div onClick={(e) => { e.stopPropagation(); setSelectedEmployeeProfile(rootAssistant); setPendingPhoto(null); }}
                                        className="bg-white/90 backdrop-blur-xl border border-gray-200/80 shadow-xl shadow-purple-900/10 rounded-3xl w-72 flex flex-col items-center relative group/ea hover:shadow-2xl hover:-translate-y-1 transition-all cursor-pointer pt-10 pb-5 px-5" style={{overflow:'visible'}}>
                                        {isEditingOrg && (
                                            <div className="absolute -top-4 -right-4 flex space-x-1 z-30" data-html2canvas-ignore="true">
                                            <button onClick={(e) => { e.stopPropagation(); setAssistantForm({ nodeId: orgData.id, assistantName: orgData.assistantName || '' }); }} className="bg-blue-500 text-white p-2 rounded-full shadow-lg hover:bg-blue-600 transition" title="Edit Executive Assistant"><Edit className="w-3 h-3" /></button>
                                            <button onClick={(e) => { e.stopPropagation(); setConfirmDialog({ message: `Remove ${rootAssistant.name} as Executive Assistant?`, confirmLabel: 'Remove', confirmClass: 'bg-red-500 hover:bg-red-600', onConfirm: () => { const newTree = updateNode(orgData, orgData.id, { assistantName: null }); saveTree(newTree); setConfirmDialog(null); } }); }} className="bg-red-500 text-white p-2 rounded-full shadow-lg hover:bg-red-600 transition" title="Remove Executive Assistant"><Trash2 className="w-3 h-3" /></button>
                                            </div>
                                        )}
                                        <div className="absolute -top-4 left-0 right-0 flex justify-center z-20 pointer-events-none">
                                            <div className="bg-[#4a3189] text-white text-[9px] font-bold uppercase tracking-widest px-4 py-2 rounded-full shadow-lg border border-white/10 ring-2 ring-[#dfa634]/30 whitespace-nowrap">Executive Assistant</div>
                                        </div>
                                        <div className="relative mb-3 group-hover/ea:scale-105 transition-transform duration-300" style={{width:'120px'}}>
                                            <div className="absolute inset-0 bg-[#dfa634] rounded-xl blur-md opacity-20 group-hover/ea:opacity-40 transition-opacity"></div>
                                            <img src={rootAssistant.profilePhoto} className="relative w-[120px] h-[180px] rounded-xl object-cover shadow-sm ring-4 ring-white border border-gray-100" alt={rootAssistant.name} />
                                        </div>
                                        <p className="text-sm font-extrabold text-gray-800 w-full text-center leading-snug group-hover/ea:text-[#4a3189] transition-colors break-words">{rootAssistant.name}</p>
                                        <p className="text-[10px] font-bold text-[#dfa634] w-full text-center mt-1 uppercase tracking-wide leading-snug break-words line-clamp-2">{rootAssistant.role}</p>
                                        </div>
                                    </div>
                                    )}
                                    {!rootAssistant && isEditingOrg && (
                                    <div className="absolute top-1/2 left-full -translate-y-1/2 flex items-center" data-html2canvas-ignore="true">
                                        <div className="h-[3px] w-12 bg-[#e2d8f0]"></div>
                                        <button onClick={(e) => { e.stopPropagation(); setAssistantForm({ nodeId: orgData.id, assistantName: '' }); }} className="px-4 py-3 bg-purple-50 text-[#4a3189] border border-dashed border-[#4a3189]/40 rounded-xl text-xs font-bold hover:bg-purple-100 transition flex items-center whitespace-nowrap">
                                        <UserPlus className="w-3.5 h-3.5 mr-1.5" /> Add Executive Assistant
                                        </button>
                                    </div>
                                    )}
                                </div>
                                </div>

                                </div>

                                <ul>{orgData.children.map(child => renderOrgTree(child, 1))}</ul>
                            </li>
                            ) : (
                                <li><div className="text-center text-gray-400 font-bold py-20">This chart is empty. Click <span className="text-[#4a3189]">Edit Structure</span> to begin building it.</div></li>
                            )
                            ) : (() => {
                                const branch = orgData.children.find(c => c.dept === activeOrgTab);
                                if (branch) return renderOrgTree(branch, 1);
                                return null;
                            })()}
                        </ul>
                        </div>
                    </div>
                    </div>
                </main>

                {/* ─── Employee profile modal ─────────────────────────────────────────── */}
                {selectedEmployeeProfile && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col relative transform transition-all">
                        <button onClick={() => { setSelectedEmployeeProfile(null); setPendingPhoto(null); }} className="absolute top-4 right-4 text-white hover:text-gray-200 hover:bg-black/20 p-2 rounded-full transition z-20"><X className="w-6 h-6" /></button>

                        <div className="flex items-start p-8 bg-gradient-to-br from-[#292c44] to-[#4a3189] relative overflow-hidden">
                        <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
                        <div className="relative z-10 mr-8 flex-shrink-0 flex flex-col items-center">
                            <div className="relative">
                                <img src={pendingPhoto || selectedEmployeeProfile.profilePhoto} className="w-48 h-48 rounded-3xl object-cover shadow-2xl ring-4 ring-white/20 bg-white/10" alt={selectedEmployeeProfile.name} />
                                {isUploadingPhoto && (<div className="absolute inset-0 flex items-center justify-center bg-black/50 rounded-3xl"><Loader2 className="w-8 h-8 text-white animate-spin" /></div>)}
                                {pendingPhoto && (<div className="absolute -top-2 -left-2 bg-amber-400 text-amber-900 text-[10px] font-black px-2 py-1 rounded-full shadow">UNSAVED</div>)}
                            </div>

                            <div className="mt-4 flex flex-col gap-2 w-full">
                                <label className="px-5 py-2.5 bg-white/10 hover:bg-white/20 text-white border border-white/20 text-xs font-bold rounded-xl shadow-lg backdrop-blur-md flex items-center justify-center w-full cursor-pointer transition">
                                    {isUploadingPhoto ? <><Loader2 className="w-3 h-3 mr-2 animate-spin" /> Processing…</> : <><Camera className="w-3 h-3 mr-2" /> Upload New Photo</>}
                                    <input type="file" accept="image/png,image/jpeg,image/jpg" className="hidden" disabled={isUploadingPhoto} onChange={handlePhotoStage} />
                                </label>
                                {/* FIX #4: explicit Save button appears after upload */}
                                {pendingPhoto && (
                                    <div className="flex gap-2">
                                        <button onClick={handlePhotoSave} className="flex-1 px-4 py-2.5 bg-green-500 hover:bg-green-600 text-white text-xs font-bold rounded-xl shadow-lg flex items-center justify-center transition"><Save className="w-3.5 h-3.5 mr-2" /> Save Photo</button>
                                        <button onClick={() => setPendingPhoto(null)} className="px-4 py-2.5 bg-white/10 hover:bg-white/20 text-white border border-white/20 text-xs font-bold rounded-xl transition">Cancel</button>
                                    </div>
                                )}

                        </div>
                    </div>
                    </div>
                )}

                {alertDialog && (
                    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
                        <h3 className="text-lg font-bold text-gray-800 mb-2">System Notice</h3>
                        <p className="text-sm text-gray-600 mb-6">{alertDialog}</p>
                        <button onClick={() => setAlertDialog(null)} className="px-6 py-2.5 bg-[#4a3189] text-white rounded-xl font-bold hover:bg-[#38236b] shadow-md hover:shadow-lg transition w-full">Okay</button>
                    </div>
                    </div>
                )}

                {confirmDialog && (
                    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center">
                        <div className={`w-12 h-12 ${confirmDialog.confirmClass?.includes('orange') ? 'bg-orange-100' : 'bg-red-100'} rounded-full flex items-center justify-center mx-auto mb-4`}><Trash2 className={`w-6 h-6 ${confirmDialog.confirmClass?.includes('orange') ? 'text-orange-500' : 'text-red-500'}`} /></div>
                        <h3 className="text-lg font-bold text-gray-800 mb-2">Confirm Action</h3>
                        <p className="text-sm text-gray-600 mb-6">{confirmDialog.message}</p>
                        <div className="flex space-x-3 justify-center">
                        <button onClick={() => setConfirmDialog(null)} className="px-6 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition flex-1">Cancel</button>
                        <button onClick={confirmDialog.onConfirm} className={`px-6 py-2.5 text-white rounded-xl font-bold shadow-md hover:shadow-lg transition flex-1 ${confirmDialog.confirmClass || 'bg-red-500 hover:bg-red-600'}`}>{confirmDialog.confirmLabel || 'Confirm'}</button>
                        </div>
                    </div>
                    </div>
                )}

                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
