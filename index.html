        const firebaseConfig = {
            // apiKey: "...",
            // authDomain: "...",
            // projectId: "...",
            // storageBucket: "...",
            // messagingSenderId: "...",
            // appId: "..."
        };

        if (Object.keys(firebaseConfig).length > 0) {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.firebaseReady = true;
        } else {
            window.firebaseReady = false;
            console.warn("⚠️ Firebase is not configured! Running in local temporary memory mode.");
        }
        
        window.doc = doc;
        window.setDoc = setDoc;
        window.onSnapshot = onSnapshot;

        const processImageFile = (file, callback) => {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_SIZE = 600;
                    let { width, height } = img;
                    if (width > height) {
                        if (width > MAX_SIZE) { height = Math.round(height * MAX_SIZE / width); width = MAX_SIZE; }
                    } else {
                        if (height > MAX_SIZE) { width = Math.round(width * MAX_SIZE / height); height = MAX_SIZE; }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    canvas.getContext('2d').drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.85));
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        // ─── ROBUST IMAGE PRE-LOADER ────────────────────────────────────────────────
        const preloadImagesForExport = async (element) => {
            const imgs = Array.from(element.querySelectorAll('img'));
            await Promise.all(imgs.map(img => new Promise(resolve => {
                if (!img.src || img.src.startsWith('data:')) { resolve(); return; }
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                const image = new Image();
                image.crossOrigin = 'anonymous';
                image.onload = () => {
                    canvas.width = image.naturalWidth || 150;
                    canvas.height = image.naturalHeight || 150;
                    ctx.drawImage(image, 0, 0);
                    try { img.src = canvas.toDataURL('image/jpeg', 0.9); } catch (e) { /* tainted — leave */ }
                    resolve();
                };
                image.onerror = () => resolve();
                image.src = img.src + (img.src.includes('?') ? '&' : '?') + '_cb=' + Date.now();
            })));
        };

        // ─── EXPORT WORKER ──────────────────────────────────────────────────────────
        // Exports EXACTLY what is currently on screen (the user's current expand/collapse
        // state is preserved — no panels are force-opened). Output is fitted onto an A4
        // page at print resolution (300 DPI) on a pure white background.
        //
        //  - sourceId: the DOM id of the element to capture. Defaults to the whole chart.
        //  - format: 'png' | 'pdf'
        const A4 = { wmm: 210, hmm: 297 }; // A4 portrait in millimetres

        const handleExport = async (format, setIsExporting, setAlertDialog, sourceId = 'org-chart-export-area', fileLabel = 'ELA_Org_Chart') => {
            setIsExporting(true);
            try {
                if (!window.html2canvas) {
                    await new Promise((res, rej) => {
                        const s = document.createElement('script');
                        s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                        s.onload = res; s.onerror = rej;
                        document.head.appendChild(s);
                    });
                }

                const liveArea = document.getElementById(sourceId);
                if (!liveArea) throw new Error('Chart element not found');

                // Clone the live area off-screen, preserving its CURRENT expand/collapse state.
                const wrapper = document.createElement('div');
                wrapper.style.cssText = [
                    'position:fixed',
                    'top:-99999px',
                    'left:-99999px',
                    'z-index:-9999',
                    'background:#ffffff',
                    'overflow:visible',
                    'padding:60px 50px',
                ].join(';');

                const clone = liveArea.cloneNode(true);

                // We do NOT force collapsed panels open here. We only make sure that panels
                // which ARE open (max-h-[5000px]) render fully and that nothing is clipped,
                // and we strip transitions so html2canvas captures a settled frame.
                const overrideStyle = document.createElement('style');
                overrideStyle.textContent = `
                    /* Keep already-open panels fully visible (do NOT open collapsed ones) */
                    [class*="max-h-[5000px]"] { max-height: none !important; overflow: visible !important; opacity: 1 !important; }
                    /* Ensure absolute-positioned labels / badges are never clipped */
                    [class*="rounded-3xl"], [class*="rounded-2xl"], [class*="rounded-xl"] { overflow: visible !important; }
                    /* Neutralise transitions/animations so the captured frame is settled */
                    * { transition: none !important; animation: none !important; }
                `;
                wrapper.appendChild(overrideStyle);
                wrapper.appendChild(clone);
                document.body.appendChild(wrapper);

                // For panels that are currently open, expand their max-height fully so nothing clips.
                // Collapsed panels (max-h-0 / opacity-0) are intentionally left untouched.
                clone.querySelectorAll('*').forEach(el => {
                    const cls = el.className || '';
                    if (typeof cls !== 'string') return;
                    if (cls.includes('max-h-[5000px]') || cls.includes('opacity-100')) {
                        el.style.maxHeight = 'none';
                        el.style.overflow = 'visible';
                        el.style.opacity = '1';
                    }
                    if (cls.includes('rounded-3xl') || cls.includes('rounded-2xl')) {
                        el.style.overflow = 'visible';
                    }
                });

                await preloadImagesForExport(wrapper);
                await new Promise(r => setTimeout(r, 400));

                const contentW = wrapper.scrollWidth;
                const contentH = wrapper.scrollHeight;

                const SCALE = 2;
                const canvas = await window.html2canvas(wrapper, {
                    backgroundColor: '#ffffff',
                    scale: SCALE,
                    useCORS: true,
                    allowTaint: false,
                    logging: false,
                    width: contentW,
                    height: contentH,
                    windowWidth: contentW,
                    windowHeight: contentH,
                    x: 0,
                    y: 0,
                    scrollX: 0,
                    scrollY: 0,
                    imageTimeout: 8000,
                    onclone: (clonedDoc) => {
                        // Only neutralise clipping on OPEN panels; never open collapsed ones.
                        clonedDoc.querySelectorAll('[class]').forEach(el => {
                            const cls = el.className || '';
                            if (typeof cls !== 'string') return;
                            if (cls.includes('max-h-[5000px]')) {
                                el.style.overflow = 'visible';
                                el.style.maxHeight = 'none';
                                el.style.opacity = '1';
                            }
                        });
                    }
                });

                document.body.removeChild(wrapper);

                // ─── Fit captured chart onto an A4 page at 300 DPI on white ─────────────
                const DPI = 300;
                const MM_PER_INCH = 25.4;
                const pxPerMm = DPI / MM_PER_INCH;

                // Decide A4 orientation based on captured aspect ratio for best fit.
                const captureLandscape = canvas.width >= canvas.height;
                const pageWmm = captureLandscape ? A4.hmm : A4.wmm;
                const pageHmm = captureLandscape ? A4.wmm : A4.hmm;

                const pageWpx = Math.round(pageWmm * pxPerMm);
                const pageHpx = Math.round(pageHmm * pxPerMm);

                // Compose onto a white A4 canvas, scaling the chart to fit with a margin.
                const MARGIN_PX = Math.round(8 * pxPerMm); // 8mm margin
                const availW = pageWpx - MARGIN_PX * 2;
                const availH = pageHpx - MARGIN_PX * 2;
                const fit = Math.min(availW / canvas.width, availH / canvas.height);
                const drawW = Math.round(canvas.width * fit);
                const drawH = Math.round(canvas.height * fit);
                const offX = Math.round((pageWpx - drawW) / 2);
                const offY = Math.round((pageHpx - drawH) / 2);

                const pageCanvas = document.createElement('canvas');
                pageCanvas.width = pageWpx;
                pageCanvas.height = pageHpx;
                const pctx = pageCanvas.getContext('2d');
                pctx.fillStyle = '#ffffff';
                pctx.fillRect(0, 0, pageWpx, pageHpx);
                pctx.imageSmoothingEnabled = true;
                pctx.imageSmoothingQuality = 'high';
                pctx.drawImage(canvas, offX, offY, drawW, drawH);

                if (format === 'png') {
                    const link = document.createElement('a');
                    link.download = `${fileLabel}.png`;
                    link.href = pageCanvas.toDataURL('image/png');
                    link.click();
                } else if (format === 'pdf') {
                    if (!window.jspdf) {
                        await new Promise((res, rej) => {
                            const s = document.createElement('script');
                            s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                            s.onload = res; s.onerror = rej;
                            document.head.appendChild(s);
                        });
                    }
                    const { jsPDF } = window.jspdf;
                    const orientation = captureLandscape ? 'landscape' : 'portrait';
                    // A4 page in mm — jsPDF native A4 format ensures correct physical print size.
                    const pdf = new jsPDF({ orientation, unit: 'mm', format: 'a4' });
                    pdf.addImage(
                        pageCanvas.toDataURL('image/png'),
                        'PNG',
                        0, 0,
                        pageWmm, pageHmm,
                        undefined,
                        'FAST'
                    );
                    pdf.save(`${fileLabel}.pdf`);
                }

            } catch (err) {
                console.error('Export failed:', err);
                setAlertDialog('Export failed: ' + err.message + '. Please check the browser console for details.');
            } finally {
                setIsExporting(false);
            }
        };

        const ModernOrgNode = ({ dept, manager, staffList, children, onEmployeeClick, isEditing, onEdit, onAddMenu, onDelete, isRoot, alignDrop, exportId, onExport }) => {
            const [expanded, setExpanded] = useState(false);

                        {!isRoot && <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="bg-red-500 text-white p-1.5 rounded-full shadow-lg hover:bg-red-600 transition" title="Delete"><Trash2 className="w-3 h-3" /></button>}
                        </div>
                    )}
                    <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 bg-gradient-to-r from-[#292c44] to-[#3a3e5c] text-white font-extrabold text-[12px] uppercase tracking-[0.2em] px-8 py-3 rounded-xl shadow-xl border border-white/10 ring-2 ring-[#dfa634]/50 z-10 w-max">
                        {dept}
                    </div>
                    </div>
                    {hasChildren && <ul>{children}</ul>}
                </li>
                )
            }

            const topTier = [];
            const midTier = [];
            const lowTier = [];

            if (hasStaff) {
                staffList.forEach(s => {
                const role = (s.role || '').toLowerCase();
                if (role.includes('lead') || role.includes('senior') || role.includes('manager') || role.includes('head') || role.includes('director') || role.includes('coordinator')) {
                    topTier.push(s);
                } else if (role.includes('junior') || role.includes('assistant') || role.includes('intern')) {
                    lowTier.push(s);
                } else {
                    midTier.push(s);
                }
                });
            }

            const tiers = [];
            if (topTier.length > 0) tiers.push({ name: 'Leads & Seniors', data: topTier });
            if (midTier.length > 0) tiers.push({ name: 'Core Staff', data: midTier });
            if (lowTier.length > 0) tiers.push({ name: 'Juniors & Support', data: lowTier });

            return (
                <li>
                <div className="flex flex-col items-center">
                    {alignDrop && (
                    <div className="flex flex-col items-center w-full">
                        <div className="font-extrabold text-[12px] uppercase tracking-[0.2em] px-8 py-3 border-2 invisible pointer-events-none">SPACER</div>
                        <div className="w-[3px] h-[30px] bg-[#e2d8f0]"></div>
                    </div>
                    )}
                    <div id={exportId} className="bg-white/90 backdrop-blur-xl border border-gray-200/80 shadow-xl shadow-purple-900/10 rounded-3xl w-72 transition-all duration-300 z-10 relative flex flex-col group hover:shadow-2xl hover:-translate-y-1 mx-auto" style={{overflow:'visible'}}>
                    
                    {isEditing && (
                        <div className="absolute -top-4 -right-4 flex space-x-1 z-30">
                        <button onClick={(e) => { e.stopPropagation(); onEdit(); }} className="bg-blue-500 text-white p-2 rounded-full shadow-lg hover:bg-blue-600 transition" title="Edit Department"><Edit className="w-3 h-3" /></button>
                        <button onClick={(e) => { e.stopPropagation(); onAddMenu(); }} className="bg-green-500 text-white p-2 rounded-full shadow-lg hover:bg-green-600 transition" title="Add Sub-Department or Staff"><Plus className="w-3 h-3" /></button>
                        {!isRoot && <button onClick={(e) => { e.stopPropagation(); onDelete(); }} className="bg-red-500 text-white p-2 rounded-full shadow-lg hover:bg-red-600 transition" title="Delete Department"><Trash2 className="w-3 h-3" /></button>}
                        </div>
                    )}

                    {/* Department badge + export control row */}
                    <div className="absolute -top-4 left-0 right-0 flex justify-center items-center gap-1 z-20">
                        <div className="bg-[#292c44] text-white font-bold text-[10px] uppercase tracking-widest px-5 py-2 rounded-full shadow-lg border border-white/10 ring-2 ring-[#dfa634]/30 whitespace-nowrap pointer-events-none">
                        {dept}
                        </div>
                        {onExport && (
                        <div className="relative group/exp pointer-events-auto export-control" data-html2canvas-ignore="true">
                            <button onClick={(e) => e.stopPropagation()} className="bg-[#dfa634] text-white w-7 h-7 rounded-full flex items-center justify-center shadow-lg border border-white/20 hover:bg-[#c9942a] transition" title="Export this department">
                            <Download className="w-3.5 h-3.5" />
                            </button>
                            <div className="absolute left-1/2 -translate-x-1/2 mt-1 w-32 bg-white border border-gray-100 rounded-xl shadow-2xl py-1.5 opacity-0 invisible group-hover/exp:opacity-100 group-hover/exp:visible transition-all z-50">
                            <button onClick={(e) => { e.stopPropagation(); onExport('png'); }} className="block w-full text-left px-4 py-1.5 text-xs text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">PNG</button>
                            <button onClick={(e) => { e.stopPropagation(); onExport('pdf'); }} className="block w-full text-left px-4 py-1.5 text-xs text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">PDF</button>
                            </div>
                        </div>
                        )}
                    </div>
                    
                    <div 
                        onClick={(e) => { e.stopPropagation(); if(manager && onEmployeeClick) onEmployeeClick(manager); }}
                        className={`pt-10 pb-5 px-6 flex flex-col items-center rounded-t-3xl ${manager ? 'cursor-pointer' : ''}`}
                    >
                        {manager ? (
                        <>
                            <div className="relative mb-3 group-hover:scale-105 transition-transform duration-300">
                            <div className="absolute inset-0 bg-[#dfa634] rounded-xl blur-md opacity-20 group-hover:opacity-40 transition-opacity"></div>
                            <img src={manager.profilePhoto} className="relative w-[90px] h-[90px] rounded-xl object-cover shadow-sm ring-4 ring-white border border-gray-100" alt={manager.name} />
                            </div>
                            <p className="text-sm font-extrabold text-gray-800 w-full text-center leading-tight group-hover:text-[#4a3189] transition-colors" style={{wordBreak:'break-word'}}>{manager.name}</p>
                            <p className="text-[10px] font-bold text-[#dfa634] w-full text-center mt-1 uppercase tracking-wider leading-tight" style={{wordBreak:'break-word'}}>{manager.role}</p>
                        </>
                        ) : null}
                    </div>

                    {/* Staff panel */}
                    {hasStaff && (
                        <div className={`transition-all duration-300 ease-in-out ${expanded ? 'max-h-[5000px] opacity-100' : 'max-h-0 opacity-0'}`} style={{overflow: expanded ? 'visible' : 'hidden'}}>
                        <div className="flex flex-col items-center w-full px-3 pb-8 pt-0 border-t border-gray-100/60 bg-gray-50/50 rounded-b-3xl">
                            {tiers.map((tier, tIndex) => (
                            <div key={tIndex} className="flex flex-col items-center w-full">
                                <div className="flex flex-col items-center">
                                <div className="w-[2px] h-6 bg-gradient-to-b from-[#4a3189]/40 to-[#4a3189]/10"></div>
                                <ChevronDown className="w-4 h-4 text-[#4a3189]/40 -mt-1.5" />
                                </div>
                                <span className="text-[9px] font-bold text-[#4a3189] uppercase tracking-widest mb-3 text-center bg-purple-100/50 px-3 py-1 rounded-full border border-purple-200/50 shadow-sm">{tier.name}</span>
                                <div className="flex flex-wrap justify-center gap-3 px-1">
                                {tier.data.map((s, idx) => (
                                    <div 
                                    key={idx} 
                                    onClick={(e) => { e.stopPropagation(); if(onEmployeeClick) onEmployeeClick(s); }}
                                    className="bg-white border border-gray-200/80 shadow-sm rounded-xl p-3 flex flex-col items-center w-[110px] hover:border-[#dfa634]/60 hover:shadow-md cursor-pointer transition-all hover:-translate-y-1 group/staff"
                                    >
                                    <img src={s.profilePhoto} className="w-[84px] h-[84px] rounded-xl mb-2 object-cover shadow-sm ring-2 ring-gray-50 group-hover/staff:ring-[#dfa634]/30 transition-all" alt={s.name} />
                                    <p className="text-[10px] font-extrabold text-gray-800 text-center leading-tight w-full group-hover/staff:text-[#4a3189]" style={{wordBreak:'break-word'}}>{s.name}</p>
                                    <p className="text-[8px] font-medium text-[#dfa634] text-center leading-tight w-full mt-1" style={{wordBreak:'break-word'}}>{s.role}</p>
                                    </div>
                                ))}
                                </div>
                            </div>
                            ))}
                        </div>
                        </div>
                    )}

                    {hasStaff && (
                        <div 
                        onClick={(e) => { e.stopPropagation(); setExpanded(!expanded); }}
                        className="absolute -bottom-4 left-1/2 transform -translate-x-1/2 z-20 cursor-pointer"
                        data-html2canvas-ignore="true"
                        >
                        <div className="bg-white border border-gray-200 text-gray-400 hover:text-[#4a3189] hover:border-[#4a3189] w-8 h-8 rounded-full flex items-center justify-center shadow-md transition-all hover:scale-110">
                            {expanded ? <ChevronDown className="w-4 h-4" /> : <ChevronRight className="w-4 h-4 transform rotate-90" />}
                        </div>
                        </div>
                    )}
                    </div>
                </div>
                
                {hasChildren && (
                    <ul>
                    {children}
                    </ul>
                )}
                </li>
            );
        };

        function App() {
            const [orgData, setOrgData] = useState(defaultOrgData);
            const [allEmployeesList, setAllEmployeesList] = useState(defaultEmployeesList);
            const [isDbLoading, setIsDbLoading] = useState(true);

            useEffect(() => {
                if (!window.firebaseReady) {
                    setIsDbLoading(false);
                    return;
                }
                const docRef = window.doc(window.db, 'orgChart', 'main');
                const unsubscribe = window.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setOrgData(data.tree);
                        setAllEmployeesList(data.employees);
                        setIsDbLoading(false);
                    } else {
                        window.setDoc(docRef, {
                            tree: defaultOrgData,
                            employees: defaultEmployeesList
                        }).then(() => setIsDbLoading(false));
                    }
                });
                return () => unsubscribe();
            }, []);

            const saveToCloud = (newTree, newEmployees) => {
                const finalTree = newTree || orgData;
                const finalEmps = newEmployees || allEmployeesList;
                if (newTree) setOrgData(newTree);
                if (newEmployees) setAllEmployeesList(finalEmps);
                if (window.firebaseReady) {
                    window.setDoc(window.doc(window.db, 'orgChart', 'main'), {
                        tree: finalTree,
                        employees: finalEmps
                    }).catch(err => {
                        console.error("Firebase Save Error:", err);
                        setAlertDialog("Failed to save to cloud database. Ensure Firebase security rules are set to test mode.");
                    });
                }
            };

            const [isEditingOrg, setIsEditingOrg] = useState(false);
            const [editingOrgNode, setEditingOrgNode] = useState(null);
            const [orgNodeForm, setOrgNodeForm] = useState({ id: '', dept: '', managerName: '', staffNames: [] });
            const [selectedEmployeeProfile, setSelectedEmployeeProfile] = useState(null);
            const [isUploadingPhoto, setIsUploadingPhoto] = useState(false);
            const [addMenuConfig, setAddMenuConfig] = useState(null); 
            const [newEmployeeForm, setNewEmployeeForm] = useState(null); 
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [alertDialog, setAlertDialog] = useState(null);
            const [isExporting, setIsExporting] = useState(false);

            // Executive Assistant management dialog state
            const [assistantForm, setAssistantForm] = useState(null);

            const [orgZoomLevel, setOrgZoomLevel] = useState(0.85);
            const [orgPan, setOrgPan] = useState({ x: 0, y: 0 });
            const [isDraggingOrg, setIsDraggingOrg] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [activeOrgTab, setActiveOrgTab] = useState('Overall Structure');
            
            const orgTabs = useMemo(() => ['Overall Structure', ...(orgData?.children?.map(c => c.dept) || [])], [orgData]);

            const updateNode = (tree, id, data) => {
                if (tree.id === id) return { ...tree, ...data };
                if (tree.children) return { ...tree, children: tree.children.map(c => updateNode(c, id, data)) };
                return tree;
            };
            
            const addNode = (tree, parentId, newNode) => {
                if (tree.id === parentId) return { ...tree, children: [...(tree.children || []), newNode] };
                if (tree.children) return { ...tree, children: tree.children.map(c => addNode(c, parentId, newNode)) };
                return tree;
            };
            
            const deleteNode = (tree, id) => {
                if (tree.children) return { ...tree, children: tree.children.filter(c => c.id !== id).map(c => deleteNode(c, id)) };
                return tree;
            };

            const getEmployeesInBranch = (node) => {
                let names = [node.managerName, node.assistantName, ...(node.staffNames || [])].filter(Boolean);
                if (node.children) {
                node.children.forEach(c => { names = names.concat(getEmployeesInBranch(c)); });
                }
                return names;
            };

            const getOrgTabStats = (tabName, specificBranch = null) => {
                let emps = allEmployeesList;
                if (tabName !== 'Overall Structure') {
                const branch = orgData.children.find(c => c.dept === tabName);
                if (branch) {
                    const namesInBranch = getEmployeesInBranch(branch);
                    emps = emps.filter(e => namesInBranch.includes(e.name));
                }
                }
                if (specificBranch) {
                emps = emps.filter(e => e.branchOffice === specificBranch);
                }
                return {
                total: emps.length,
                male: emps.filter(e => e.gender === 'Male').length,
                female: emps.filter(e => e.gender === 'Female').length
                };
            };

            const getEmp = (name) => allEmployeesList.find(e => e.name === name) || { name, role: 'Unknown', profilePhoto: `https://i.pravatar.cc/150?u=${encodeURIComponent(name)}` };
            const getStaff = (names) => names.map(getEmp);

            const rootManager = getEmp(orgData.managerName);
            const rootAssistant = orgData.assistantName ? getEmp(orgData.assistantName) : null;

            const handlePhotoUpload = (e, empId) => {
                const file = e.target.files[0];
                if (!file) return;
                if (!file.type.match(/^image\/(jpeg|jpg|png)$/i)) {
                    setAlertDialog("Please upload a PNG or JPEG image file only.");
                    e.target.value = '';
                    return;
                }
                setIsUploadingPhoto(true);
                processImageFile(file, (base64) => {
                    const newEmps = allEmployeesList.map(emp =>
                        emp.id === empId ? { ...emp, profilePhoto: base64 } : emp
                    );
                    saveToCloud(null, newEmps);
                    setSelectedEmployeeProfile(prev => ({ ...prev, profilePhoto: base64 }));
                    setIsUploadingPhoto(false);
                });
                e.target.value = '';
            };

            const handlePhotoDelete = (emp) => {
                setConfirmDialog({
                    message: `Remove the current photo for ${emp.name}? They will revert to their default avatar.`,
                    isDanger: false,
                    confirmLabel: 'Remove Photo',
                    confirmClass: 'bg-orange-500 hover:bg-orange-600',
                    onConfirm: () => {
                        const fallbackPhoto = emp.defaultPhoto ||
                            `https://i.pravatar.cc/150?u=${encodeURIComponent(emp.name)}`;
                        const newEmps = allEmployeesList.map(e =>
                            e.id === emp.id ? { ...e, profilePhoto: fallbackPhoto } : e
                        );
                        saveToCloud(null, newEmps);
                        setSelectedEmployeeProfile(prev => ({ ...prev, profilePhoto: fallbackPhoto }));
                        setConfirmDialog(null);
                    }
                });
            };

            const handleAddNewEmployee = () => {
                if (!newEmployeeForm.name || !newEmployeeForm.role) {
                setAlertDialog("Name and Role are required.");
                return;
                }
                const newId = `ELA${String(Math.floor(Math.random() * 1000)).padStart(3, '0')}`;
                const defaultAvatar = `https://randomuser.me/api/portraits/${newEmployeeForm.gender === 'Female' ? 'women' : 'men'}/${Math.floor(Math.random() * 90) + 1}.jpg`;
                const newEmp = {
                    id: newId, name: newEmployeeForm.name, role: newEmployeeForm.role,
                    gender: newEmployeeForm.gender || 'Other', dept: 'Assigned',
                    email: `${newEmployeeForm.name.toLowerCase().replace(/\s+/g, '')}@ela.edu`,
                    contactNumber: 'TBD', branchOffice: 'HQ', insurance: 'Staff member',
                    joinDate: new Date().toISOString().split('T')[0],
                    profilePhoto: defaultAvatar, defaultPhoto: defaultAvatar
                };
                const newEmps = [...allEmployeesList, newEmp];
                const appendStaff = (tree) => {
                    if (tree.id === newEmployeeForm.parentId) return { ...tree, staffNames: [...(tree.staffNames || []), newEmp.name] };
                    if (tree.children) return { ...tree, children: tree.children.map(appendStaff) };
                    return tree;
                };
                const newTree = appendStaff(orgData);
                saveToCloud(newTree, newEmps);
                setNewEmployeeForm(null);
                setAlertDialog(`${newEmp.name} successfully added to the organization.`);
            };

            // Save the executive assistant assignment for a given node id.
            const handleSaveAssistant = () => {
                if (!assistantForm) return;
                const newTree = updateNode(orgData, assistantForm.nodeId, { assistantName: assistantForm.assistantName || null });
                saveToCloud(newTree, null);
                setAssistantForm(null);
            };

            // Per-department export helper. Each ModernOrgNode card carries a stable export id.
            const exportDepartment = (node, format) => {
                handleExport(format, setIsExporting, setAlertDialog, `dept-export-${node.id}`, `ELA_${(node.dept || 'Department').replace(/[^a-z0-9]+/gi, '_')}`);
            };

            const renderOrgTree = (node, level = 1) => {
                const manager = node.managerName ? getEmp(node.managerName) : null;
                const staff = getStaff(node.staffNames || []);
                return (
                <ModernOrgNode 
                    key={node.id} dept={node.dept} manager={manager} staffList={staff} 
                    exportId={`dept-export-${node.id}`}
                    onExport={(fmt) => exportDepartment(node, fmt)}
                    onEmployeeClick={(emp) => { setSelectedEmployeeProfile(emp); }}
                    isEditing={isEditingOrg} isRoot={false}
                    onEdit={() => { setEditingOrgNode(node.id); setOrgNodeForm({ id: node.id, dept: node.dept, managerName: node.managerName || '', staffNames: node.staffNames || [], assistantName: node.assistantName || '' }); }}
                    onAddMenu={() => { setAddMenuConfig({ parentId: node.id, deptName: node.dept }); }}
                    onDelete={() => {
                        setConfirmDialog({
                            message: `Are you sure you want to delete ${node.dept} and all its sub-departments?`,
                            confirmLabel: 'Delete', confirmClass: 'bg-red-500 hover:bg-red-600',
                            onConfirm: () => { const newTree = deleteNode(orgData, node.id); saveToCloud(newTree, null); setConfirmDialog(null); }
                        });
                    }}
                >
                    {node.children && node.children.length > 0 && node.children.map(child => renderOrgTree(child, level + 1))}
                </ModernOrgNode>
                );
            };

            if (isDbLoading) {
                return (
                    <div className="flex flex-col h-screen bg-[#f4f7fa] items-center justify-center">
                        <Loader2 className="w-12 h-12 text-[#dfa634] animate-spin mb-4" />
                        <h2 className="text-xl font-bold text-gray-800">Connecting to Cloud Database...</h2>
                        <p className="text-gray-500 text-sm mt-2">Loading organization structure</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-[#f4f7fa] font-sans relative">

                {isExporting && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-[9999] flex flex-col items-center justify-center">
                        <Loader2 className="w-14 h-14 text-[#dfa634] animate-spin mb-5" />
                        <h2 className="text-xl font-bold text-white">Preparing Export…</h2>
                        <p className="text-white/70 text-sm mt-2">Rendering current view to an A4 print-quality page. Please wait.</p>
                    </div>
                )}

                <header className="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-20 flex-shrink-0 relative">
                    <div className="flex items-center">
                    <div className="w-10 h-10 bg-gradient-to-br from-[#4a3189] to-[#6d48c7] rounded-md flex items-center justify-center mr-3 shadow-md">
                        <span className="text-white font-black text-sm tracking-widest">ELA</span>
                    </div>
                    <h1 className="text-xl font-extrabold text-gray-800 tracking-tight">Interactive <span className="text-[#dfa634]">Org Chart</span></h1>
                    </div>
                    <div className="flex items-center space-x-6">
                    {window.firebaseReady ? (
                        <div className="flex items-center space-x-2 bg-green-50 px-3 py-1.5 rounded-full border border-green-100 shadow-inner">
                            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span className="text-xs font-bold text-green-700">Cloud Sync Active</span>
                        </div>
                    ) : (
                        <div className="flex items-center space-x-2 bg-yellow-50 px-3 py-1.5 rounded-full border border-yellow-100 shadow-inner">
                            <div className="w-2 h-2 rounded-full bg-yellow-500"></div>
                            <span className="text-xs font-bold text-yellow-700">Local Mode</span>
                        </div>
                    )}
                    <div className="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100 shadow-inner">
                        <div className="w-8 h-8 rounded-full bg-[#dfa634] text-white flex items-center justify-center font-bold text-xs shadow-sm ring-2 ring-white">HR</div>
                        <span className="text-sm font-bold text-gray-700">System Admin</span>
                    </div>
                    </div>
                </header>

                <main className="flex-1 flex flex-col overflow-hidden p-6 max-w-[1600px] mx-auto w-full">
                    
                    <div className="flex flex-col bg-white p-4 rounded-2xl shadow-sm border border-gray-100/80 space-y-4 z-10 relative">
                    <div className="flex items-center justify-between">
                        <div>
                        <h2 className="text-xl font-bold text-gray-800 flex items-center">
                            <Network className="w-5 h-5 mr-2 text-[#dfa634]" /> ELA Company Structure
                        </h2>
                        <p className="text-gray-500 mt-1 text-sm font-medium">Pan, zoom, filter, and edit the living organizational hierarchy.</p>
                        </div>
                        
                        <div className="flex items-center space-x-3">
                        <div className="flex items-center space-x-1 bg-gray-50 rounded-xl p-1 border border-gray-200 shadow-inner">
                            <button onClick={() => setOrgZoomLevel(z => Math.max(z - 0.1, 0.3))} className="p-2 bg-white shadow-sm rounded-lg text-gray-600 hover:text-[#4a3189] hover:bg-purple-50 transition" title="Zoom Out"><Minus className="w-4 h-4" /></button>
                            <button onClick={() => { setOrgZoomLevel(0.85); setOrgPan({ x: 0, y: 0 }); }} className="px-3 py-2 text-xs font-bold text-gray-700 hover:text-[#4a3189] transition w-16 text-center" title="Reset">{Math.round(orgZoomLevel * 100)}%</button>
                            <button onClick={() => setOrgZoomLevel(z => Math.min(z + 0.1, 2.5))} className="p-2 bg-white shadow-sm rounded-lg text-gray-600 hover:text-[#4a3189] hover:bg-purple-50 transition" title="Zoom In"><Plus className="w-4 h-4" /></button>
                        </div>

                        {/* Executive Assistant management (only meaningful on Overall Structure) */}
                        {activeOrgTab === 'Overall Structure' && (
                            <button
                                onClick={() => setAssistantForm({ nodeId: orgData.id, assistantName: orgData.assistantName || '' })}
                                className="px-5 py-2.5 bg-white shadow-sm border border-gray-200 text-gray-700 rounded-xl text-sm font-bold flex items-center transition-all hover:border-[#4a3189]/50 hover:bg-purple-50/50 hover:shadow-md"
                                title="Add or edit Executive Assistant"
                            >
                                <UserPlus className="w-4 h-4 mr-2 text-[#4a3189]" />
                                {orgData.assistantName ? 'Edit Executive Assistant' : 'Add Executive Assistant'}
                            </button>
                        )}
                        
                        <button 
                            onClick={() => setIsEditingOrg(!isEditingOrg)} 
                            className={`px-5 py-2.5 shadow-sm border rounded-xl text-sm font-bold flex items-center transition-all ${isEditingOrg ? 'bg-[#4a3189] text-white border-[#4a3189] hover:bg-[#38236b] shadow-purple-900/20' : 'bg-white border-gray-200 text-gray-700 hover:border-[#dfa634]/50 hover:bg-yellow-50/50 hover:shadow-md'}`}
                        >
                            {isEditingOrg ? <><Save className="w-4 h-4 mr-2" /> Done Editing</> : <><Edit className="w-4 h-4 mr-2" /> Edit Structure</>}
                        </button>
                        
                        <div className="relative group">
                            <button
                                disabled={isExporting}
                                className="px-5 py-2.5 bg-gradient-to-r from-[#dfa634] to-[#f5c76a] text-white shadow-lg shadow-yellow-600/20 rounded-xl text-sm font-bold flex items-center transition hover:scale-105 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:scale-100"
                            >
                                {isExporting ? <Loader2 className="w-4 h-4 mr-2 animate-spin" /> : <Download className="w-4 h-4 mr-2" />}
                                Export
                            </button>
                            {!isExporting && (
                                <div className="absolute right-0 mt-2 w-60 bg-white border border-gray-100 rounded-xl shadow-2xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top-right z-50">
                                    <p className="text-[10px] font-bold text-gray-400 uppercase tracking-wider px-4 pt-1 pb-2">Current view · A4 · 300 DPI</p>
                                    <button onClick={() => handleExport('png', setIsExporting, setAlertDialog)} className="block w-full text-left px-5 py-2 text-sm text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">Export as PNG (A4)</button>
                                    <button onClick={() => handleExport('pdf', setIsExporting, setAlertDialog)} className="block w-full text-left px-5 py-2 text-sm text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">Export as PDF (A4)</button>
                                </div>
                            )}
                        </div>
                        </div>
                    </div>

                    <div className="flex space-x-4 overflow-x-auto pb-6 pt-3 px-2 custom-scrollbar">
                        {orgTabs.map(tab => {
                        const stat = getOrgTabStats(tab);
                        const isActive = activeOrgTab === tab;
                        const isOverall = tab === 'Overall Structure';
                        return (
                            <div 
                            key={tab}
                            onClick={() => { setActiveOrgTab(tab); setOrgPan({ x: 0, y: 0 }); setOrgZoomLevel(0.85); }}
                            className={`flex-shrink-0 cursor-pointer px-5 py-4 w-[250px] rounded-2xl transition-all duration-300 border relative overflow-hidden ${
                                isActive 
                                ? 'bg-[#292c44] text-white shadow-xl shadow-[#292c44]/30 scale-[1.02] border-transparent z-10' 
                                : 'bg-white text-gray-600 hover:border-[#dfa634]/50 hover:shadow-lg border-gray-200'
                            }`}
                            >
                            {isActive && <div className="absolute -right-6 -top-6 w-24 h-24 bg-[#dfa634]/20 rounded-full blur-2xl"></div>}
                            <div className="relative z-10">
                                <div className="flex items-center space-x-3 mb-3">
                                <div className={`p-2 rounded-lg ${isActive ? 'bg-white/10' : 'bg-purple-50'}`}>
                                    {isOverall ? <Network className={`w-5 h-5 ${isActive ? 'text-[#dfa634]' : 'text-[#4a3189]'}`} /> : <Briefcase className={`w-5 h-5 ${isActive ? 'text-[#dfa634]' : 'text-[#4a3189]'}`} />}
                                </div>
                                <h4 className={`text-sm font-black truncate ${isActive ? 'text-white' : 'text-gray-800'}`}>{tab}</h4>
                                </div>
                                {tab === 'Student Placement' ? (
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center text-[10px]">
                                        <span className={`font-bold ${isActive ? 'text-gray-300' : 'text-[#4a3189]'}`}>Phnom Penh</span>
                                        <span className={isActive ? 'text-white/90' : 'text-gray-500'}>
                                        <strong className={`text-[12px] ${isActive ? 'text-white' : 'text-gray-800'}`}>{getOrgTabStats(tab, 'Phnom Penh HQ').total}</strong> <span className="opacity-75">(M:{getOrgTabStats(tab, 'Phnom Penh HQ').male} F:{getOrgTabStats(tab, 'Phnom Penh HQ').female})</span>
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center text-[10px]">
                                        <span className={`font-bold ${isActive ? 'text-gray-300' : 'text-[#4a3189]'}`}>Siem Reap</span>
                                        <span className={isActive ? 'text-white/90' : 'text-gray-500'}>

                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 bg-gradient-to-r from-[#292c44] to-[#3a3e5c] text-white">
                        <h3 className="text-lg font-bold flex items-center"><UserPlus className="w-5 h-5 mr-2 text-[#dfa634]" /> Executive Assistant</h3>
                        <button onClick={() => setAssistantForm(null)} className="text-white/60 hover:text-white transition"><X className="w-5 h-5" /></button>
                        </div>
                        <div className="p-6 space-y-4">
                        <p className="text-sm text-gray-600">Assign, change, or remove the Executive Assistant reporting directly under the head of this structure.</p>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Select Executive Assistant</label>
                            <select className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#4a3189]/50 focus:border-[#4a3189] outline-none shadow-sm transition bg-white"
                            value={assistantForm.assistantName} onChange={(e) => setAssistantForm({...assistantForm, assistantName: e.target.value})}>
                            <option value="">-- No Executive Assistant --</option>
                            {allEmployeesList.map(emp => (
                                <option key={emp.id} value={emp.name}>{emp.name} ({emp.role})</option>
                            ))}
                            </select>
                        </div>
                        </div>
                        <div className="p-5 border-t border-gray-100 bg-gray-50 flex justify-end space-x-3">
                        <button onClick={() => setAssistantForm(null)} className="px-5 py-2.5 text-sm font-bold text-gray-600 hover:text-gray-800 hover:bg-gray-200 rounded-xl transition">Cancel</button>
                        <button onClick={handleSaveAssistant} className="px-6 py-2.5 text-white text-sm font-bold rounded-xl transition bg-[#4a3189] hover:bg-[#38236b] shadow-md hover:shadow-lg flex items-center"><Save className="w-4 h-4 mr-2" /> Save</button>
                        </div>
                    </div>
                    </div>
                )}

                {editingOrgNode && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 bg-gradient-to-r from-[#292c44] to-[#3a3e5c] text-white flex-shrink-0">
                        <h3 className="text-lg font-bold flex items-center">
                            <Network className="w-5 h-5 mr-2 text-[#dfa634]" /> 
                            {editingOrgNode.startsWith('new_') ? 'Add New Department' : 'Edit Department'}
                        </h3>
                        <button onClick={() => setEditingOrgNode(null)} className="text-white/60 hover:text-white transition"><X className="w-5 h-5" /></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6 bg-gray-50/30">
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Department Name</label>
                            <input type="text" className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#4a3189]/50 focus:border-[#4a3189] outline-none shadow-sm transition"
                            value={orgNodeForm.dept} onChange={(e) => setOrgNodeForm({...orgNodeForm, dept: e.target.value})} />
                        </div>
                        
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Department Manager</label>
                            <select className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#4a3189]/50 focus:border-[#4a3189] outline-none shadow-sm transition bg-white"
                            value={orgNodeForm.managerName} onChange={(e) => setOrgNodeForm({...orgNodeForm, managerName: e.target.value})}>
                            <option value="">-- No Manager --</option>
                            {allEmployeesList.map(emp => (
                                <option key={emp.id} value={emp.name}>{emp.name} ({emp.role})</option>
                            ))}
                            </select>
                        </div>

                        {orgNodeForm.id === 'root' && (
                            <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Executive Assistant</label>
                            <select className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#4a3189]/50 focus:border-[#4a3189] outline-none shadow-sm transition bg-white"
                                value={orgNodeForm.assistantName || ''} onChange={(e) => setOrgNodeForm({...orgNodeForm, assistantName: e.target.value})}>
                                <option value="">-- No Assistant --</option>
                                {allEmployeesList.map(emp => (
                                <option key={emp.id} value={emp.name}>{emp.name} ({emp.role})</option>
                                ))}
                            </select>
                            </div>
                        )}

                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 pb-2 border-b border-gray-200">Assign Staff Members</label>
                            <div className="bg-white border border-gray-200 rounded-xl p-2 h-64 overflow-y-auto custom-scrollbar shadow-inner">
                            {allEmployeesList.map(emp => {
                                if (emp.name === orgNodeForm.managerName || emp.name === orgNodeForm.assistantName) return null;
                                const isSelected = orgNodeForm.staffNames.includes(emp.name);
                                return (
                                <label key={emp.id} className={`flex items-center space-x-3 p-2.5 rounded-lg border cursor-pointer transition mb-1 ${isSelected ? 'bg-purple-50/50 border-[#4a3189]/30' : 'border-transparent hover:bg-gray-50'}`}>
                                    <input type="checkbox" className="w-4 h-4 text-[#4a3189] rounded border-gray-300 focus:ring-[#4a3189] cursor-pointer"
                                    checked={isSelected}
                                    onChange={(e) => {
                                        if (e.target.checked) setOrgNodeForm({...orgNodeForm, staffNames: [...orgNodeForm.staffNames, emp.name]});
                                        else setOrgNodeForm({...orgNodeForm, staffNames: orgNodeForm.staffNames.filter(name => name !== emp.name)});
                                    }} />
                                    <img src={emp.profilePhoto} className="w-10 h-10 rounded-lg object-cover border border-gray-100" alt="" />
                                    <div className="flex-1 overflow-hidden">
                                    <p className="text-xs font-bold text-gray-800 truncate leading-tight">{emp.name}</p>
                                    <p className="text-[10px] text-gray-500 truncate leading-tight mt-0.5">{emp.role} • {emp.dept}</p>
                                    </div>
                                </label>
                                );
                            })}
                            </div>
                            <div className="text-right mt-2 text-xs text-gray-500">
                            <strong className="text-[#4a3189]">{orgNodeForm.staffNames.length}</strong> staff selected
                            </div>
                        </div>
                        </div>
                        
                        <div className="p-5 border-t border-gray-100 bg-white flex justify-end space-x-3 flex-shrink-0">
                        <button onClick={() => setEditingOrgNode(null)} className="px-5 py-2.5 text-sm font-bold text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-xl transition">Cancel</button>
                        <button 
                            disabled={!orgNodeForm.dept}
                            onClick={() => {
                                let newTree;
                                if (editingOrgNode.startsWith('new_')) {
                                    const parentId = editingOrgNode.replace('new_', '');
                                    newTree = addNode(orgData, parentId, orgNodeForm);
                                } else {
                                    newTree = updateNode(orgData, editingOrgNode, orgNodeForm);
                                }
                                saveToCloud(newTree, null);
                                setEditingOrgNode(null);
                            }}
                            className="px-6 py-2.5 text-white text-sm font-bold rounded-xl transition bg-[#4a3189] hover:bg-[#38236b] hover:shadow-lg hover:-translate-y-0.5 disabled:opacity-50 disabled:transform-none shadow-sm flex items-center"
                        >
                            <Save className="w-4 h-4 mr-2" /> Save Department
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                {alertDialog && (
                    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center transform transition-all">
                        <h3 className="text-lg font-bold text-gray-800 mb-2">System Notice</h3>
                        <p className="text-sm text-gray-600 mb-6">{alertDialog}</p>
                        <button onClick={() => setAlertDialog(null)} className="px-6 py-2.5 bg-[#4a3189] text-white rounded-xl font-bold hover:bg-[#38236b] shadow-md hover:shadow-lg transition w-full">Okay</button>
                    </div>
                    </div>
                )}

                {confirmDialog && (
                    <div className="fixed inset-0 bg-black/40 z-50 flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center transform transition-all">
                        <div className={`w-12 h-12 ${confirmDialog.confirmClass?.includes('orange') ? 'bg-orange-100' : 'bg-red-100'} rounded-full flex items-center justify-center mx-auto mb-4`}>
                        <Trash2 className={`w-6 h-6 ${confirmDialog.confirmClass?.includes('orange') ? 'text-orange-500' : 'text-red-500'}`} />
                        </div>
                        <h3 className="text-lg font-bold text-gray-800 mb-2">Confirm Action</h3>
                        <p className="text-sm text-gray-600 mb-6">{confirmDialog.message}</p>
                        <div className="flex space-x-3 justify-center">
                        <button onClick={() => setConfirmDialog(null)} className="px-6 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition flex-1">Cancel</button>
                        <button onClick={confirmDialog.onConfirm} className={`px-6 py-2.5 text-white rounded-xl font-bold shadow-md hover:shadow-lg transition flex-1 ${confirmDialog.confirmClass || 'bg-red-500 hover:bg-red-600'}`}>
                            {confirmDialog.confirmLabel || 'Confirm'}
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
