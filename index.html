        const processImageFile = (file, callback) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 600; 
                    const MAX_HEIGHT = 600;
                    let width = img.width;
                    let height = img.height;

                    if (width > height) {
                        if (width > MAX_WIDTH) {
                            height *= MAX_WIDTH / width;
                            width = MAX_WIDTH;
                        }
                    } else {
                        if (height > MAX_HEIGHT) {
                            width *= MAX_HEIGHT / height;
                            height = MAX_HEIGHT;
                        }
                    }

                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);

                    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                    callback(dataUrl);
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(file);
        };

        function App() {
            const [orgData, setOrgData] = useState(defaultOrgData);
            const [allEmployeesList, setAllEmployeesList] = useState(defaultEmployeesList);
            const [isDbLoading, setIsDbLoading] = useState(true);

            // Fetch data from Firebase on load
            useEffect(() => {
                if (!window.firebaseReady) {
                    setIsDbLoading(false);
                    return;
                }

                const docRef = window.doc(window.db, 'orgChart', 'main');
                
                // Real-time listener: Updates UI if anyone changes the database
                const unsubscribe = window.onSnapshot(docRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        setOrgData(data.tree);
                        setAllEmployeesList(data.employees);
                        setIsDbLoading(false);
                    } else {
                        // Document doesn't exist yet, save the default structure
                        window.setDoc(docRef, {
                            tree: defaultOrgData,
                            employees: defaultEmployeesList
                        }).then(() => setIsDbLoading(false));
                    }
                });

                return () => unsubscribe();
            }, []);

            // Master function to save changes to the Cloud
            const saveToCloud = (newTree, newEmployees) => {
                const finalTree = newTree || orgData;
                const finalEmps = newEmployees || allEmployeesList;
                
                // Immediate UI update for responsiveness
                if (newTree) setOrgData(newTree);
                if (newEmployees) setAllEmployeesList(finalEmps);

                // Background save to Cloud Firestore
                if (window.firebaseReady) {
                    window.setDoc(window.doc(window.db, 'orgChart', 'main'), {
                        tree: finalTree,
                        employees: finalEmps
                    }).catch(err => {
                        console.error("Firebase Save Error:", err);
                        setAlertDialog("Failed to save to cloud database. Ensure Firebase security rules are set to test mode.");
                    });
                }
            };

            const [isEditingOrg, setIsEditingOrg] = useState(false);
            const [editingOrgNode, setEditingOrgNode] = useState(null);
            const [orgNodeForm, setOrgNodeForm] = useState({ id: '', dept: '', managerName: '', staffNames: [] });
            const [selectedEmployeeProfile, setSelectedEmployeeProfile] = useState(null);
            
            // Photo Editing States
            const [editingPhotoId, setEditingPhotoId] = useState(null);
            const [tempPhotoUrl, setTempPhotoUrl] = useState('');

            // Add Menu States
            const [addMenuConfig, setAddMenuConfig] = useState(null); 
            const [newEmployeeForm, setNewEmployeeForm] = useState(null); 

            // Modal States
            const [confirmDialog, setConfirmDialog] = useState(null);
            const [alertDialog, setAlertDialog] = useState(null);

            const [orgZoomLevel, setOrgZoomLevel] = useState(0.85);
            const [orgPan, setOrgPan] = useState({ x: 0, y: 0 });
            const [isDraggingOrg, setIsDraggingOrg] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            const [activeOrgTab, setActiveOrgTab] = useState('Overall Structure');
            const [forceExpand, setForceExpand] = useState(false);
            
            const orgTabs = useMemo(() => ['Overall Structure', ...(orgData?.children?.map(c => c.dept) || [])], [orgData]);

            const updateNode = (tree, id, data) => {
                if (tree.id === id) return { ...tree, ...data };
                if (tree.children) return { ...tree, children: tree.children.map(c => updateNode(c, id, data)) };
                return tree;
            };
            
            const addNode = (tree, parentId, newNode) => {
                if (tree.id === parentId) return { ...tree, children: [...(tree.children || []), newNode] };
                if (tree.children) return { ...tree, children: tree.children.map(c => addNode(c, parentId, newNode)) };
                return tree;
            };
            
            const deleteNode = (tree, id) => {
                if (tree.children) return { ...tree, children: tree.children.filter(c => c.id !== id).map(c => deleteNode(c, id)) };
                return tree;
            };

            const getEmployeesInBranch = (node) => {
                let names = [node.managerName, ...(node.staffNames || [])].filter(Boolean);
                if (node.children) {
                node.children.forEach(c => { names = names.concat(getEmployeesInBranch(c)); });
                }
                return names;
            };

            const getOrgTabStats = (tabName, specificBranch = null) => {
                let emps = allEmployeesList;
                if (tabName !== 'Overall Structure') {
                const branch = orgData.children.find(c => c.dept === tabName);
                if (branch) {
                    const namesInBranch = getEmployeesInBranch(branch);
                    emps = emps.filter(e => namesInBranch.includes(e.name));
                }
                }
                if (specificBranch) {
                emps = emps.filter(e => e.branchOffice === specificBranch);
                }
                return {
                total: emps.length,
                male: emps.filter(e => e.gender === 'Male').length,
                female: emps.filter(e => e.gender === 'Female').length
                };
            };

            const handleExport = async (format) => {
                setAlertDialog(`Preparing ${format.toUpperCase()} export... Please wait.`);
                
                // FIX: Temporarily reset viewport transforms
                // html2canvas produces misaligned text and photos when capturing elements 
                // inside a scaled/translated container. Resetting to 1:1 fixes the alignment.
                const prevZoom = orgZoomLevel;
                const prevPan = orgPan;
                const wasEditing = isEditingOrg;
                
                setOrgZoomLevel(1);
                setOrgPan({ x: 0, y: 0 });
                setIsEditingOrg(false); // Hide edit buttons for clean export
                setForceExpand(true);   // Automatically expand all branches to show staff photos
                
                // Wait for React to re-render and CSS transitions to finish smoothly
                await new Promise(resolve => setTimeout(resolve, 800));
                
                try {
                if (!window.html2canvas) {
                    await new Promise((resolve) => {
                    const script = document.createElement('script');
                    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                    script.onload = resolve;
                    document.head.appendChild(script);
                    });
                }
                
                const element = document.getElementById('org-chart-export-area');
                if (!element) throw new Error("Chart element not found");
                
                const canvas = await window.html2canvas(element, {
                    backgroundColor: '#f4f7fa',
                    scale: 2, // High resolution for clear text/photos
                    useCORS: true,
                    logging: false,
                    // Explicitly define dimensions to prevent viewport clipping
                    width: element.scrollWidth,
                    height: element.scrollHeight,
                    windowWidth: element.scrollWidth,
                    windowHeight: element.scrollHeight,
                    x: 0,
                    y: 0
                });

                if (format === 'png') {
                    const link = document.createElement('a');
                    link.download = 'ELA_Org_Chart.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                    setAlertDialog(null);
                } else if (format === 'pdf') {
                    if (!window.jspdf) {
                    await new Promise((resolve) => {
                        const script = document.createElement('script');
                        script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
                        script.onload = resolve;
                        document.head.appendChild(script);
                    });
                    }
                    const { jsPDF } = window.jspdf;
                    const pdf = new jsPDF({
                    orientation: canvas.width > canvas.height ? 'landscape' : 'portrait',
                    unit: 'px',
                    format: [canvas.width, canvas.height]
                    });
                    pdf.addImage(canvas.toDataURL('image/png'), 'PNG', 0, 0, canvas.width, canvas.height);
                    pdf.save('ELA_Org_Chart.pdf');
                    setAlertDialog(null);
                }
                } catch (error) {
                console.error('Export failed:', error);
                setAlertDialog('Export failed. Please try again or check console for details.');
                } finally {
                // Restore original viewport and edit states
                setOrgZoomLevel(prevZoom);
                setOrgPan(prevPan);
                setIsEditingOrg(wasEditing);
                setForceExpand(false);
                setAlertDialog(null);
                }
            };

            const getEmp = (name) => allEmployeesList.find(e => e.name === name) || { name, role: 'Unknown', profilePhoto: `https://i.pravatar.cc/150?u=${encodeURIComponent(name)}` };
            const getStaff = (names) => names.map(getEmp);

            const rootManager = getEmp(orgData.managerName);
            const rootAssistant = getEmp(orgData.assistantName);

            const handleSavePhoto = (empId) => {
                const newEmps = allEmployeesList.map(emp => emp.id === empId ? { ...emp, profilePhoto: tempPhotoUrl } : emp);
                saveToCloud(null, newEmps);
                setSelectedEmployeeProfile(prev => ({ ...prev, profilePhoto: tempPhotoUrl }));
                setEditingPhotoId(null);
            };

            const handleAddNewEmployee = () => {
                if (!newEmployeeForm.name || !newEmployeeForm.role) {
                setAlertDialog("Name and Role are required.");
                return;
                }

                const newId = `ELA${String(Math.floor(Math.random() * 1000)).padStart(3, '0')}`;
                const newEmp = {
                    id: newId,
                    name: newEmployeeForm.name,
                    role: newEmployeeForm.role,
                    gender: newEmployeeForm.gender || 'Other',
                    dept: 'Assigned',
                    email: `${newEmployeeForm.name.toLowerCase().replace(/\s+/g, '')}@ela.edu`,
                    contactNumber: 'TBD',
                    branchOffice: 'HQ',
                    insurance: 'Staff member',
                    joinDate: new Date().toISOString().split('T'),
                    profilePhoto: `https://randomuser.me/api/portraits/${newEmployeeForm.gender === 'Female' ? 'women' : 'men'}/${Math.floor(Math.random() * 90) + 1}.jpg`
                };

                const newEmps = [...allEmployeesList, newEmp];

                // Recursive function to add staff to the specific department
                const appendStaff = (tree) => {
                    if (tree.id === newEmployeeForm.parentId) {
                        return { ...tree, staffNames: [...(tree.staffNames || []), newEmp.name] };
                    }
                    if (tree.children) {
                        return { ...tree, children: tree.children.map(appendStaff) };
                    }
                    return tree;
                };
                
                const newTree = appendStaff(orgData);

                saveToCloud(newTree, newEmps);
                setNewEmployeeForm(null);
                setAlertDialog(`${newEmp.name} successfully added to the organization.`);
            };

            const renderOrgTree = (node, level = 1) => {
                const manager = node.managerName ? getEmp(node.managerName) : null;
                const staff = getStaff(node.staffNames || []);
                
                return (
                <ModernOrgNode 
                    key={node.id} 
                    dept={node.dept} 
                    manager={manager} 
                    staffList={staff} 
                    forceExpand={forceExpand}
                    onEmployeeClick={(emp) => {
                        setSelectedEmployeeProfile(emp);
                        setEditingPhotoId(null);
                    }}
                    isEditing={isEditingOrg}
                    isRoot={false}
                    onEdit={() => { 
                        setEditingOrgNode(node.id); 
                        setOrgNodeForm({ id: node.id, dept: node.dept, managerName: node.managerName || '', staffNames: node.staffNames || [] }); 
                    }}
                    onAddMenu={() => {
                        setAddMenuConfig({ parentId: node.id, deptName: node.dept });
                    }}
                    onDelete={() => {
                        setConfirmDialog({
                            message: `Are you sure you want to delete ${node.dept} and all its sub-departments?`,
                            onConfirm: () => {
                                const newTree = deleteNode(orgData, node.id);
                                saveToCloud(newTree, null);
                                setConfirmDialog(null);
                            }
                        });
                    }}
                >
                    {node.children && node.children.length > 0 && node.children.map(child => renderOrgTree(child, level + 1))}
                </ModernOrgNode>
                );
            };

            // Show loading spinner while fetching initial Firebase data
            if (isDbLoading) {
                return (
                    <div className="flex flex-col h-screen bg-[#f4f7fa] items-center justify-center">
                        <Loader2 className="w-12 h-12 text-[#dfa634] animate-spin mb-4" />
                        <h2 className="text-xl font-bold text-gray-800">Connecting to Cloud Database...</h2>
                        <p className="text-gray-500 text-sm mt-2">Loading organization structure</p>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-screen bg-[#f4f7fa] font-sans relative">
                <header className="h-16 bg-white shadow-sm flex items-center justify-between px-6 z-20 flex-shrink-0 relative">
                    <div className="flex items-center">
                    <div className="w-10 h-10 bg-gradient-to-br from-[#4a3189] to-[#6d48c7] rounded-md flex items-center justify-center mr-3 shadow-md">
                        <span className="text-white font-black text-sm tracking-widest">ELA</span>
                    </div>
                    <h1 className="text-xl font-extrabold text-gray-800 tracking-tight">Interactive <span className="text-[#dfa634]">Org Chart</span></h1>
                    </div>
                    <div className="flex items-center space-x-6">
                    {window.firebaseReady ? (
                        <div className="flex items-center space-x-2 bg-green-50 px-3 py-1.5 rounded-full border border-green-100 shadow-inner">
                            <div className="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
                            <span className="text-xs font-bold text-green-700">Cloud Sync Active</span>
                        </div>
                    ) : (
                        <div className="flex items-center space-x-2 bg-yellow-50 px-3 py-1.5 rounded-full border border-yellow-100 shadow-inner">
                            <div className="w-2 h-2 rounded-full bg-yellow-500"></div>
                            <span className="text-xs font-bold text-yellow-700">Local Mode</span>
                        </div>
                    )}
                    <div className="flex items-center space-x-2 bg-gray-50 px-3 py-1.5 rounded-full border border-gray-100 shadow-inner">
                        <div className="w-8 h-8 rounded-full bg-[#dfa634] text-white flex items-center justify-center font-bold text-xs shadow-sm ring-2 ring-white">HR</div>
                        <span className="text-sm font-bold text-gray-700">System Admin</span>
                    </div>
                    </div>
                </header>

                <main className="flex-1 flex flex-col overflow-hidden p-6 max-w-[1600px] mx-auto w-full">
                    
                    <div className="flex flex-col bg-white p-4 rounded-2xl shadow-sm border border-gray-100/80 space-y-4 z-10 relative">
                    <div className="flex items-center justify-between">
                        <div>
                        <h2 className="text-xl font-bold text-gray-800 flex items-center">
                            <Network className="w-5 h-5 mr-2 text-[#dfa634]" /> ELA Company Structure
                        </h2>
                        <p className="text-gray-500 mt-1 text-sm font-medium">Pan, zoom, filter, and edit the living organizational hierarchy.</p>
                        </div>
                        
                        <div className="flex items-center space-x-3">
                        <div className="flex items-center space-x-1 bg-gray-50 rounded-xl p-1 border border-gray-200 shadow-inner">
                            <button onClick={() => setOrgZoomLevel(z => Math.max(z - 0.1, 0.3))} className="p-2 bg-white shadow-sm rounded-lg text-gray-600 hover:text-[#4a3189] hover:bg-purple-50 transition" title="Zoom Out"><Minus className="w-4 h-4" /></button>
                            <button onClick={() => { setOrgZoomLevel(0.85); setOrgPan({ x: 0, y: 0 }); }} className="px-3 py-2 text-xs font-bold text-gray-700 hover:text-[#4a3189] transition w-16 text-center" title="Reset">{Math.round(orgZoomLevel * 100)}%</button>
                            <button onClick={() => setOrgZoomLevel(z => Math.min(z + 0.1, 2.5))} className="p-2 bg-white shadow-sm rounded-lg text-gray-600 hover:text-[#4a3189] hover:bg-purple-50 transition" title="Zoom In"><Plus className="w-4 h-4" /></button>
                        </div>
                        
                        <button 
                            onClick={() => setIsEditingOrg(!isEditingOrg)} 
                            className={`px-5 py-2.5 shadow-sm border rounded-xl text-sm font-bold flex items-center transition-all ${isEditingOrg ? 'bg-[#4a3189] text-white border-[#4a3189] hover:bg-[#38236b] shadow-purple-900/20' : 'bg-white border-gray-200 text-gray-700 hover:border-[#dfa634]/50 hover:bg-yellow-50/50 hover:shadow-md'}`}
                        >
                            {isEditingOrg ? <><Save className="w-4 h-4 mr-2" /> Done Editing</> : <><Edit className="w-4 h-4 mr-2" /> Edit Structure</>}
                        </button>
                        
                        <div className="relative group">
                            <button className="px-5 py-2.5 bg-gradient-to-r from-[#dfa634] to-[#f5c76a] text-white shadow-lg shadow-yellow-600/20 rounded-xl text-sm font-bold flex items-center transition hover:scale-105">
                            <Download className="w-4 h-4 mr-2" /> Export
                            </button>
                            <div className="absolute right-0 mt-2 w-48 bg-white border border-gray-100 rounded-xl shadow-2xl py-2 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all transform origin-top-right z-50">
                            <button onClick={() => handleExport('png')} className="block w-full text-left px-5 py-2 text-sm text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">Export as PNG</button>
                            <button onClick={() => handleExport('pdf')} className="block w-full text-left px-5 py-2 text-sm text-gray-700 hover:bg-purple-50 hover:text-[#4a3189] font-bold transition">Export as PDF</button>
                            </div>
                        </div>
                        </div>
                    </div>

                    <div className="flex space-x-4 overflow-x-auto pb-6 pt-3 px-2 custom-scrollbar">
                        {orgTabs.map(tab => {
                        const stat = getOrgTabStats(tab);
                        const isActive = activeOrgTab === tab;
                        const isOverall = tab === 'Overall Structure';
                        return (
                            <div 
                            key={tab}
                            onClick={() => { setActiveOrgTab(tab); setOrgPan({ x: 0, y: 0 }); setOrgZoomLevel(0.85); }}
                            className={`flex-shrink-0 cursor-pointer px-5 py-4 w-[250px] rounded-2xl transition-all duration-300 border relative overflow-hidden ${
                                isActive 
                                ? 'bg-[#292c44] text-white shadow-xl shadow-[#292c44]/30 scale-[1.02] border-transparent z-10' 
                                : 'bg-white text-gray-600 hover:border-[#dfa634]/50 hover:shadow-lg border-gray-200'
                            }`}
                            >
                            {isActive && <div className="absolute -right-6 -top-6 w-24 h-24 bg-[#dfa634]/20 rounded-full blur-2xl"></div>}
                            
                            <div className="relative z-10">
                                <div className="flex items-center space-x-3 mb-3">
                                <div className={`p-2 rounded-lg ${isActive ? 'bg-white/10' : 'bg-purple-50'}`}>
                                    {isOverall ? <Network className={`w-5 h-5 ${isActive ? 'text-[#dfa634]' : 'text-[#4a3189]'}`} /> : <Briefcase className={`w-5 h-5 ${isActive ? 'text-[#dfa634]' : 'text-[#4a3189]'}`} />}
                                </div>
                                <h4 className={`text-sm font-black truncate ${isActive ? 'text-white' : 'text-gray-800'}`}>{tab}</h4>
                                </div>

                                {tab === 'Student Placement' ? (
                                <div className="space-y-2">
                                    <div className="flex justify-between items-center text-[10px]">
                                        <span className={`font-bold ${isActive ? 'text-gray-300' : 'text-[#4a3189]'}`}>Phnom Penh</span>
                                        <span className={isActive ? 'text-white/90' : 'text-gray-500'}>
                                        <strong className={`text-[12px] ${isActive ? 'text-white' : 'text-gray-800'}`}>{getOrgTabStats(tab, 'Phnom Penh HQ').total}</strong> <span className="opacity-75">(M:{getOrgTabStats(tab, 'Phnom Penh HQ').male} F:{getOrgTabStats(tab, 'Phnom Penh HQ').female})</span>
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-center text-[10px]">
                                        <span className={`font-bold ${isActive ? 'text-gray-300' : 'text-[#4a3189]'}`}>Siem Reap</span>
                                        <span className={isActive ? 'text-white/90' : 'text-gray-500'}>
                                        <strong className={`text-[12px] ${isActive ? 'text-white' : 'text-gray-800'}`}>{getOrgTabStats(tab, 'Siem Reap Branch').total}</strong> <span className="opacity-75">(M:{getOrgTabStats(tab, 'Siem Reap Branch').male} F:{getOrgTabStats(tab, 'Siem Reap Branch').female})</span>
                                        </span>
                                    </div>
                                </div>
                                ) : (
                                <div className="flex items-center justify-between text-[11px] mt-1 pt-3 border-t border-gray-100/20">
                                    <span className={isActive ? 'text-white/80' : 'text-gray-500'}>Total Staff: <strong className={`text-sm ml-1 ${isActive ? 'text-white' : 'text-[#4a3189]'}`}>{stat.total}</strong></span>
                                    <div className={`flex items-center space-x-2 px-2 py-0.5 rounded ${isActive ? 'bg-white/10' : 'bg-gray-50'}`}>
                                    <span className={isActive ? 'text-blue-200' : 'text-blue-600'} title="Male"><User className="w-3 h-3 inline mr-0.5"/>{stat.male}</span>
                                    <span className={isActive ? 'text-pink-200' : 'text-pink-600'} title="Female"><User className="w-3 h-3 inline mr-0.5"/>{stat.female}</span>
                                    </div>
                                </div>
                                )}
                            </div>
                            </div>
                        )
                        })}
                    </div>
                    </div>
                    
                    <div 
                    className={`flex-1 mt-6 relative bg-white rounded-3xl shadow-inner overflow-hidden border border-gray-200/60 flex items-start pt-16 ${isDraggingOrg ? 'cursor-grabbing' : 'cursor-grab'}`}
                    onWheel={(e) => {
                        const delta = e.deltaY > 0 ? -0.05 : 0.05;
                        setOrgZoomLevel(z => Math.min(Math.max(0.3, z + delta), 2.5));
                    }}
                    onMouseDown={(e) => {
                        setIsDraggingOrg(true);
                        setDragStart({ x: e.clientX - orgPan.x, y: e.clientY - orgPan.y });
                    }}
                    onMouseMove={(e) => {
                        if (!isDraggingOrg) return;
                        setOrgPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
                    }}
                    onMouseUp={() => setIsDraggingOrg(false)}
                    onMouseLeave={() => setIsDraggingOrg(false)}
                    >
                    <div className="absolute inset-0" style={{ backgroundImage: 'radial-gradient(#cbd5e1 1px, transparent 1px)', backgroundSize: '40px 40px', opacity: 0.3, pointerEvents: 'none' }}></div>
                    
                    <style>{`
                        .modern-tree ul { padding-top: 30px; position: relative; display: flex; justify-content: center; }
                        .modern-tree li { flex: 1; float: left; text-align: center; list-style-type: none; position: relative; padding: 30px 10px 0 10px; transition: all 0.3s; display: flex; flex-direction: column; align-items: center; }
                        .modern-tree li::before, .modern-tree li::after { content: ''; position: absolute; top: 0; right: 50%; border-top: 3px solid #e2d8f0; width: 50%; height: 30px; z-index: 0; }
                        .modern-tree li::after { right: auto; left: 50%; border-left: 3px solid #e2d8f0; }
                        .modern-tree li:only-child::after, .modern-tree li:only-child::before { display: none; }
                        .modern-tree li:only-child { padding-top: 0; }
                        .modern-tree li:first-child::before, .modern-tree li:last-child::after { border: 0 none; }
                        .modern-tree li:last-child::before { border-right: 3px solid #e2d8f0; border-radius: 0 16px 0 0; }
                        .modern-tree li:first-child::after { border-radius: 16px 0 0 0; }
                        .modern-tree ul ul::before { content: ''; position: absolute; top: 0; left: 50%; border-left: 3px solid #e2d8f0; width: 0; height: 30px; transform: translateX(-50%); z-index: 0; }
                        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
                        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
                        .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
                        .custom-scrollbar::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
                        .no-select { user-select: none; -webkit-user-select: none; }
                    `}</style>
                    
                    <div 
                        className="min-w-max w-full px-10 pb-[500px] flex justify-center origin-top no-select z-10"
                        style={{ 
                        transform: `translate(${orgPan.x}px, ${orgPan.y}px) scale(${orgZoomLevel})`,
                        transition: isDraggingOrg ? 'none' : 'transform 0.1s ease-out'
                        }}
                    >
                        <div className="modern-tree inline-block p-12" id="org-chart-export-area">
                        <ul>
                            {activeOrgTab === 'Overall Structure' ? (
                            <li>
                                <div className="flex flex-col items-center">
                                <div className="z-10 relative group cursor-pointer hover:-translate-y-1 transition-transform duration-300 mx-auto w-72" onClick={() => { setSelectedEmployeeProfile(rootManager); setEditingPhotoId(null); }}>
                                    {isEditingOrg && (
                                    <div className="absolute -top-4 -right-4 flex space-x-1 z-30">
                                        <button onClick={(e) => { e.stopPropagation(); setEditingOrgNode(orgData.id); setOrgNodeForm({ id: orgData.id, dept: orgData.dept, managerName: orgData.managerName || '', staffNames: orgData.staffNames || [], assistantName: orgData.assistantName || '' }); }} className="bg-blue-500 text-white p-2 rounded-full shadow-lg hover:bg-blue-600 transition" title="Edit Department"><Edit className="w-3 h-3" /></button>
                                        <button onClick={(e) => { e.stopPropagation(); setAddMenuConfig({ parentId: orgData.id, deptName: orgData.dept }); }} className="bg-green-500 text-white p-2 rounded-full shadow-lg hover:bg-green-600 transition" title="Add"><Plus className="w-3 h-3" /></button>
                                    </div>
                                    )}
                                    <div className="absolute -top-4 left-1/2 transform -translate-x-1/2 z-20 w-max">
                                    <div className="bg-[#292c44] text-white font-bold text-[10px] uppercase tracking-widest px-5 py-2 rounded-full shadow-lg border border-white/10 ring-2 ring-[#dfa634]/30">
                                        {orgData.dept}
                                    </div>
                                    </div>
                                    <div className="bg-white/90 backdrop-blur-xl border border-gray-200/80 shadow-xl shadow-purple-900/10 rounded-3xl pt-10 pb-5 px-6 w-72 flex items-center flex-col relative group-hover:shadow-2xl transition-all">
                                    <div className="relative mb-3">
                                        <div className="absolute inset-0 bg-[#dfa634] rounded-xl blur-md opacity-20 group-hover:opacity-40 transition-opacity"></div>
                                        <img src={rootManager.profilePhoto} className="relative w-[90px] aspect-square rounded-xl object-cover shadow-sm ring-4 ring-white border border-gray-100" alt={rootManager.name} />
                                    </div>
                                    <p className="text-sm font-extrabold text-gray-800 hover:text-[#4a3189] transition-colors">{rootManager.name}</p>
                                    <p className="text-[10px] font-bold text-[#dfa634] uppercase tracking-wider mt-1">{rootManager.role}</p>
                                    </div>
                                </div>

                                <div className="relative flex justify-center w-full h-24">
                                    <div className="w-[3px] h-full bg-[#e2d8f0]"></div>
                                    <div className="absolute top-1/2 right-1/2 flex items-center pr-0 transform -translate-y-1/2">
                                        <div 
                                        onClick={() => { setSelectedEmployeeProfile(rootAssistant); setEditingPhotoId(null); }}
                                        className="bg-white/90 backdrop-blur-xl border border-gray-200/80 shadow-xl shadow-purple-900/10 rounded-2xl p-2.5 w-56 flex items-center z-10 relative group hover:shadow-2xl hover:-translate-y-0.5 transition-all cursor-pointer"
                                        >
                                        <img src={rootAssistant.profilePhoto} className="w-[56px] aspect-square rounded-lg mr-3 object-cover shadow-sm ring-2 ring-white border border-gray-100" alt={rootAssistant.name} />
                                        <div className="text-left overflow-hidden">
                                            <p className="text-[10px] font-extrabold text-gray-800 truncate group-hover:text-[#4a3189] transition-colors">{rootAssistant.name}</p>
                                            <p className="text-[8px] font-bold text-[#4a3189] truncate mt-0.5">{rootAssistant.role}</p>
                                        </div>
                                        </div>
                                        <div className="w-8 h-[3px] bg-[#e2d8f0]"></div>
                                    </div>
                                </div>
                                </div>

                                <ul>
                                {orgData.children.map(child => renderOrgTree(child, 1))}
                                </ul>
                            </li>
                            ) : (() => {
                                const branch = orgData.children.find(c => c.dept === activeOrgTab);
                                if (branch) return renderOrgTree(branch, 1);
                                return null;
                            })()}
                        </ul>
                        </div>
                    </div>
                    </div>
                </main>

                {/* MODALS */}
                {selectedEmployeeProfile && (
                    <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl overflow-hidden flex flex-col relative transform transition-all">
                        <button onClick={() => { setSelectedEmployeeProfile(null); setEditingPhotoId(null); }} className="absolute top-4 right-4 text-white hover:text-gray-200 hover:bg-black/20 p-2 rounded-full transition z-20"><X className="w-6 h-6" /></button>
                        
                        <div className="flex items-start p-8 bg-gradient-to-br from-[#292c44] to-[#4a3189] relative overflow-hidden">
                        <div className="absolute inset-0 bg-[url('https://www.transparenttextures.com/patterns/cubes.png')] opacity-10 mix-blend-overlay"></div>
                        
                        <div className="relative z-10 mr-8 flex-shrink-0 flex flex-col items-center">
                            <img src={selectedEmployeeProfile.profilePhoto} className="w-48 aspect-square rounded-3xl object-cover shadow-2xl ring-4 ring-white/20 bg-white/10" alt={selectedEmployeeProfile.name} />
                            
                            <label className="mt-4 px-5 py-2 bg-white/10 hover:bg-white/20 text-white border border-white/20 text-xs font-bold rounded-xl transition shadow-lg backdrop-blur-md flex items-center justify-center w-full cursor-pointer">
                                <Camera className="w-3 h-3 mr-2" /> Upload Photo
                                <input 
                                    type="file" 
                                    accept="image/png, image/jpeg, image/jpg"
                                    className="hidden"
                                    onChange={(e) => {
                                        const file = e.target.files; // FIX: Target the specific file
                                        if (file) {
                                            // Process and instantly save the file
                                            processImageFile(file, (base64) => {
                                                const newEmps = allEmployeesList.map(emp => 
                                                    emp.id === selectedEmployeeProfile.id ? { ...emp, profilePhoto: base64 } : emp
                                                );
                                                saveToCloud(null, newEmps); // Save to database
                                                setSelectedEmployeeProfile(prev => ({ ...prev, profilePhoto: base64 })); // Update UI immediately
                                            });
                                        }
                                        e.target.value = ''; // Reset input to allow uploading the same file again if needed
                                    }} 
                                />
                            </label>
                        </div>

                        <div className="z-10 flex flex-col justify-center min-h-[12rem] flex-1">
                            <h2 className="text-3xl font-black text-white">{selectedEmployeeProfile.name}</h2>
                            <p className="text-[#dfa634] font-bold tracking-widest uppercase text-sm mt-2">{selectedEmployeeProfile.role}</p>
                            <div className="mt-6 flex flex-col gap-3 text-white/90 text-sm">
                            <span className="flex items-center"><Building className="w-4 h-4 mr-3 opacity-70"/> {selectedEmployeeProfile.dept}</span>
                            <span className="flex items-center"><Mail className="w-4 h-4 mr-3 opacity-70"/> {selectedEmployeeProfile.email}</span>
                            </div>
                        </div>
                        </div>
                        
                        <div className="p-8 space-y-6 bg-gray-50/50">
                        <div className="grid grid-cols-2 gap-y-6 gap-x-8">
                            <div>
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center"><Building className="w-3 h-3 mr-1" /> Branch Office</p>
                            <p className="text-sm font-bold text-gray-800">{selectedEmployeeProfile.branchOffice}</p>
                            </div>
                            <div>
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center"><Phone className="w-3 h-3 mr-1" /> Contact Number</p>
                            <p className="text-sm font-medium text-gray-800">{selectedEmployeeProfile.contactNumber}</p>
                            </div>
                            <div>
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center"><User className="w-3 h-3 mr-1" /> Status / Type</p>
                            <p className="text-sm font-medium text-gray-800">{selectedEmployeeProfile.insurance}</p>
                            </div>
                            <div>
                            <p className="text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-1 flex items-center"><Calendar className="w-3 h-3 mr-1" /> Join Date</p>
                            <p className="text-sm font-medium text-gray-800">{selectedEmployeeProfile.joinDate}</p>
                            </div>
                        </div>
                        </div>
                        
                        <div className="p-6 bg-white border-t border-gray-100 flex justify-between rounded-b-3xl space-x-4">
                        <button 
                            onClick={() => {
                            setConfirmDialog({
                                message: `Are you sure you want to permanently delete ${selectedEmployeeProfile.name}? This will remove them from all departments.`,
                                onConfirm: () => {
                                    const newEmps = allEmployeesList.filter(e => e.id !== selectedEmployeeProfile.id);
                                    
                                    const removeEmp = (tree) => {
                                        let updated = { ...tree };
                                        if (updated.managerName === selectedEmployeeProfile.name) updated.managerName = null;
                                        if (updated.assistantName === selectedEmployeeProfile.name) updated.assistantName = null;
                                        if (updated.staffNames) updated.staffNames = updated.staffNames.filter(n => n !== selectedEmployeeProfile.name);
                                        if (updated.children) updated.children = updated.children.map(removeEmp);
                                        return updated;
                                    };
                                    
                                    const newTree = removeEmp(orgData);
                                    saveToCloud(newTree, newEmps);
                                    
                                    setSelectedEmployeeProfile(null);
                                    setConfirmDialog(null);
                                }
                            });
                            }}
                            className="px-6 py-3 bg-red-50 text-red-600 border border-red-200 rounded-xl text-sm font-bold hover:bg-red-100 transition shadow-sm flex items-center"
                        >
                            <Trash2 className="w-4 h-4 mr-2" /> Delete Employee
                        </button>
                        <button 
                            onClick={() => { setSelectedEmployeeProfile(null); setEditingPhotoId(null); }}
                            className="px-8 py-3 bg-gray-100 border border-gray-200 text-gray-700 rounded-xl text-sm font-bold hover:bg-gray-200 hover:text-gray-900 transition shadow-sm flex-1"
                        >
                            Close Profile
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                {addMenuConfig && (
                    <div className="fixed inset-0 bg-black/50 z- flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm overflow-hidden flex flex-col relative transform transition-all">
                        <button onClick={() => setAddMenuConfig(null)} className="absolute top-4 right-4 text-gray-400 hover:text-gray-800 hover:bg-gray-100 p-2 rounded-full transition z-10"><X className="w-5 h-5" /></button>
                        <div className="p-6 pt-8 border-b border-gray-100 bg-gray-50 text-center">
                        <h3 className="text-xl font-black text-gray-800">Add to Department</h3>
                        <p className="text-sm font-bold text-[#dfa634] mt-1">{addMenuConfig.deptName}</p>
                        </div>
                        <div className="p-6 space-y-4">
                        <button 
                            onClick={() => {
                            setEditingOrgNode('new_' + addMenuConfig.parentId); 
                            setOrgNodeForm({ id: `node_${Date.now()}`, dept: 'New Sub-Department', managerName: '', staffNames: [] });
                            setAddMenuConfig(null);
                            }}
                            className="w-full flex items-center p-4 bg-white border-2 border-gray-100 rounded-xl hover:border-[#4a3189] hover:bg-purple-50 hover:shadow-md transition group"
                        >
                            <div className="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center text-[#4a3189] group-hover:scale-110 transition mr-4">
                            <Network className="w-6 h-6" />
                            </div>
                            <div className="text-left">
                            <h4 className="font-bold text-gray-800 group-hover:text-[#4a3189]">New Sub-Department</h4>
                            <p className="text-xs text-gray-500 mt-0.5">Create a branching division.</p>
                            </div>
                        </button>
                        
                        <button 
                            onClick={() => {
                            setNewEmployeeForm({ parentId: addMenuConfig.parentId, name: '', role: '', gender: 'Male' });
                            setAddMenuConfig(null);
                            }}
                            className="w-full flex items-center p-4 bg-white border-2 border-gray-100 rounded-xl hover:border-[#dfa634] hover:bg-yellow-50 hover:shadow-md transition group"
                        >
                            <div className="w-12 h-12 bg-yellow-100 rounded-full flex items-center justify-center text-[#dfa634] group-hover:scale-110 transition mr-4">
                            <UserPlus className="w-6 h-6" />
                            </div>
                            <div className="text-left">
                            <h4 className="font-bold text-gray-800 group-hover:text-[#dfa634]">New Team Member</h4>
                            <p className="text-xs text-gray-500 mt-0.5">Add staff directly here.</p>
                            </div>
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                {newEmployeeForm && (
                    <div className="fixed inset-0 bg-black/50 z- flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md overflow-hidden flex flex-col">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 bg-gradient-to-r from-[#dfa634] to-[#f5c76a] text-white">
                        <h3 className="text-lg font-bold flex items-center"><UserPlus className="w-5 h-5 mr-2" /> Add New Team Member</h3>
                        <button onClick={() => setNewEmployeeForm(null)} className="text-white/80 hover:text-white transition"><X className="w-5 h-5" /></button>
                        </div>
                        
                        <div className="p-6 space-y-4">
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Full Name</label>
                            <input 
                            type="text" 
                            className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#dfa634]/50 focus:border-[#dfa634] outline-none shadow-sm transition"
                            value={newEmployeeForm.name}
                            onChange={(e) => setNewEmployeeForm({...newEmployeeForm, name: e.target.value})}
                            placeholder="e.g. John Doe"
                            />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Job Title / Role</label>
                            <input 
                            type="text" 
                            className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#dfa634]/50 focus:border-[#dfa634] outline-none shadow-sm transition"
                            value={newEmployeeForm.role}
                            onChange={(e) => setNewEmployeeForm({...newEmployeeForm, role: e.target.value})}
                            placeholder="e.g. Marketing Assistant"
                            />
                        </div>
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Gender (For Auto-Avatar)</label>
                            <select 
                            className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#dfa634]/50 focus:border-[#dfa634] outline-none shadow-sm transition bg-white"
                            value={newEmployeeForm.gender}
                            onChange={(e) => setNewEmployeeForm({...newEmployeeForm, gender: e.target.value})}
                            >
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            </select>
                        </div>
                        </div>
                        
                        <div className="p-5 border-t border-gray-100 bg-gray-50 flex justify-end space-x-3">
                        <button onClick={() => setNewEmployeeForm(null)} className="px-5 py-2.5 text-sm font-bold text-gray-600 hover:text-gray-800 hover:bg-gray-200 rounded-xl transition">Cancel</button>
                        <button 
                            onClick={handleAddNewEmployee}
                            className="px-6 py-2.5 text-white text-sm font-bold rounded-xl transition bg-[#dfa634] hover:bg-[#c9942a] shadow-md hover:shadow-lg"
                        >
                            Create Employee
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                {editingOrgNode && (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg overflow-hidden flex flex-col max-h-[90vh]">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 bg-gradient-to-r from-[#292c44] to-[#3a3e5c] text-white flex-shrink-0">
                        <h3 className="text-lg font-bold flex items-center">
                            <Network className="w-5 h-5 mr-2 text-[#dfa634]" /> 
                            {editingOrgNode.startsWith('new_') ? 'Add New Department' : 'Edit Department'}
                        </h3>
                        <button onClick={() => setEditingOrgNode(null)} className="text-white/60 hover:text-white transition"><X className="w-5 h-5" /></button>
                        </div>
                        
                        <div className="p-6 overflow-y-auto custom-scrollbar flex-1 space-y-6 bg-gray-50/30">
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Department Name</label>
                            <input 
                            type="text" 
                            className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#4a3189]/50 focus:border-[#4a3189] outline-none shadow-sm transition"
                            value={orgNodeForm.dept}
                            onChange={(e) => setOrgNodeForm({...orgNodeForm, dept: e.target.value})}
                            />
                        </div>
                        
                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Department Manager</label>
                            <select 
                            className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#4a3189]/50 focus:border-[#4a3189] outline-none shadow-sm transition bg-white"
                            value={orgNodeForm.managerName}
                            onChange={(e) => setOrgNodeForm({...orgNodeForm, managerName: e.target.value})}
                            >
                            <option value="">-- No Manager --</option>
                            {allEmployeesList.map(emp => (
                                <option key={emp.id} value={emp.name}>{emp.name} ({emp.role})</option>
                            ))}
                            </select>
                        </div>

                        {orgNodeForm.id === 'root' && (
                            <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-2">Executive Assistant</label>
                            <select 
                                className="w-full border border-gray-200 rounded-xl p-3 text-sm focus:ring-2 focus:ring-[#4a3189]/50 focus:border-[#4a3189] outline-none shadow-sm transition bg-white"
                                value={orgNodeForm.assistantName || ''}
                                onChange={(e) => setOrgNodeForm({...orgNodeForm, assistantName: e.target.value})}
                            >
                                <option value="">-- No Assistant --</option>
                                {allEmployeesList.map(emp => (
                                <option key={emp.id} value={emp.name}>{emp.name} ({emp.role})</option>
                                ))}
                            </select>
                            </div>
                        )}

                        <div>
                            <label className="block text-xs font-bold text-gray-500 uppercase tracking-wider mb-3 pb-2 border-b border-gray-200">Assign Staff Members</label>
                            <div className="bg-white border border-gray-200 rounded-xl p-2 h-64 overflow-y-auto custom-scrollbar shadow-inner">
                            {allEmployeesList.map(emp => {
                                if (emp.name === orgNodeForm.managerName || emp.name === orgNodeForm.assistantName) return null;
                                
                                const isSelected = orgNodeForm.staffNames.includes(emp.name);
                                return (
                                <label key={emp.id} className={`flex items-center space-x-3 p-2.5 rounded-lg border cursor-pointer transition mb-1 ${isSelected ? 'bg-purple-50/50 border-[#4a3189]/30' : 'border-transparent hover:bg-gray-50'}`}>
                                    <input 
                                    type="checkbox" 
                                    className="w-4 h-4 text-[#4a3189] rounded border-gray-300 focus:ring-[#4a3189] cursor-pointer"
                                    checked={isSelected}
                                    onChange={(e) => {
                                        if (e.target.checked) {
                                        setOrgNodeForm({...orgNodeForm, staffNames: [...orgNodeForm.staffNames, emp.name]});
                                        } else {
                                        setOrgNodeForm({...orgNodeForm, staffNames: orgNodeForm.staffNames.filter(name => name !== emp.name)});
                                        }
                                    }}
                                    />
                                    <img src={emp.profilePhoto} className="w-10 aspect-square rounded-lg object-cover border border-gray-100" alt="" />
                                    <div className="flex-1 overflow-hidden">
                                    <p className="text-xs font-bold text-gray-800 truncate leading-tight">{emp.name}</p>
                                    <p className="text-[10px] text-gray-500 truncate leading-tight mt-0.5">{emp.role} • {emp.dept}</p>
                                    </div>
                                </label>
                                );
                            })}
                            </div>
                            <div className="text-right mt-2 text-xs text-gray-500">
                            <strong className="text-[#4a3189]">{orgNodeForm.staffNames.length}</strong> staff selected
                            </div>
                        </div>
                        </div>
                        
                        <div className="p-5 border-t border-gray-100 bg-white flex justify-end space-x-3 flex-shrink-0">
                        <button onClick={() => setEditingOrgNode(null)} className="px-5 py-2.5 text-sm font-bold text-gray-600 hover:text-gray-800 hover:bg-gray-100 rounded-xl transition">Cancel</button>
                        <button 
                            disabled={!orgNodeForm.dept}
                            onClick={() => {
                                let newTree;
                                if (editingOrgNode.startsWith('new_')) {
                                    const parentId = editingOrgNode.replace('new_', '');
                                    newTree = addNode(orgData, parentId, orgNodeForm);
                                } else {
                                    newTree = updateNode(orgData, editingOrgNode, orgNodeForm);
                                }
                                saveToCloud(newTree, null);
                                setEditingOrgNode(null);
                            }}
                            className="px-6 py-2.5 text-white text-sm font-bold rounded-xl transition bg-[#4a3189] hover:bg-[#38236b] hover:shadow-lg hover:-translate-y-0.5 disabled:opacity-50 disabled:transform-none shadow-sm flex items-center"
                        >
                            <Save className="w-4 h-4 mr-2" /> Save Department
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                {alertDialog && (
                    <div className="fixed inset-0 bg-black/40 z- flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center transform transition-all">
                        <h3 className="text-lg font-bold text-gray-800 mb-2">System Notice</h3>
                        <p className="text-sm text-gray-600 mb-6">{alertDialog}</p>
                        <button 
                        onClick={() => setAlertDialog(null)} 
                        className="px-6 py-2.5 bg-[#4a3189] text-white rounded-xl font-bold hover:bg-[#38236b] shadow-md hover:shadow-lg transition w-full"
                        >
                        Okay
                        </button>
                    </div>
                    </div>
                )}

                {confirmDialog && (
                    <div className="fixed inset-0 bg-black/40 z- flex items-center justify-center p-4 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6 text-center transform transition-all">
                        <div className="w-12 h-12 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <Trash2 className="w-6 h-6 text-red-500" />
                        </div>
                        <h3 className="text-lg font-bold text-gray-800 mb-2">Confirm Action</h3>
                        <p className="text-sm text-gray-600 mb-6">{confirmDialog.message}</p>
                        <div className="flex space-x-3 justify-center">
                        <button 
                            onClick={() => setConfirmDialog(null)} 
                            className="px-6 py-2.5 bg-gray-100 text-gray-700 rounded-xl font-bold hover:bg-gray-200 transition flex-1"
                        >
                            Cancel
                        </button>
                        <button 
                            onClick={confirmDialog.onConfirm} 
                            className="px-6 py-2.5 bg-red-500 text-white rounded-xl font-bold hover:bg-red-600 shadow-md hover:shadow-lg transition flex-1"
                        >
                            Delete
                        </button>
                        </div>
                    </div>
                    </div>
                )}

                </div>
            );
        }

        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
